<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>菜谱封面审核工具</title>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: #f5f5f5;
            padding: 20px;
        }
        .header {
            background: white;
            padding: 20px;
            border-radius: 8px;
            margin-bottom: 20px;
            box-shadow: 0 2px 8px rgba(0,0,0,0.1);
        }
        .header h1 { font-size: 24px; margin-bottom: 15px; }
        .controls { display: flex; gap: 10px; flex-wrap: wrap; align-items: center; }
        .controls input, .controls select {
            padding: 8px 12px;
            border: 1px solid #ddd;
            border-radius: 4px;
            font-size: 14px;
        }
        .controls input[type="text"] { width: 200px; }
        .btn {
            padding: 8px 16px;
            border: none;
            border-radius: 4px;
            cursor: pointer;
            font-size: 14px;
            transition: all 0.2s;
        }
        .btn-primary { background: #07c160; color: white; }
        .btn-primary:hover { background: #06ad56; }
        .btn-secondary { background: #1989fa; color: white; }
        .btn-secondary:hover { background: #1570d5; }
        .btn-outline { background: white; border: 1px solid #ddd; }
        .btn-outline:hover { background: #f5f5f5; }
        
        .stats {
            margin-top: 15px;
            padding: 10px;
            background: #f0f0f0;
            border-radius: 4px;
            font-size: 14px;
            color: #666;
        }
        
        .grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(250px, 1fr));
            gap: 20px;
        }
        
        .card {
            background: white;
            border-radius: 8px;
            overflow: hidden;
            box-shadow: 0 2px 8px rgba(0,0,0,0.1);
            transition: transform 0.2s;
        }
        .card:hover { transform: translateY(-2px); }
        .card img {
            width: 100%;
            height: 180px;
            object-fit: cover;
            background: #eee;
        }
        .card-body { padding: 12px; }
        .card-title {
            font-size: 16px;
            font-weight: 500;
            margin-bottom: 8px;
            color: #333;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }
        .card-meta {
            font-size: 12px;
            color: #999;
            margin-bottom: 10px;
        }
        .card-actions {
            display: flex;
            gap: 8px;
        }
        .card-actions .btn {
            flex: 1;
            padding: 6px;
            font-size: 13px;
        }
        .btn-match { background: #07c160; color: white; }
        .btn-mismatch { background: #fa5151; color: white; }
        .btn-unsure { background: #ffc107; color: #333; }
        
        .card[data-status="match"] { border: 2px solid #07c160; }
        .card[data-status="mismatch"] { border: 2px solid #fa5151; }
        .card[data-status="unsure"] { border: 2px solid #ffc107; }
        
        .empty-state {
            text-align: center;
            padding: 60px;
            color: #999;
        }
    </style>
</head>
<body>
    <div class="header">
        <h1>🍳 菜谱封面审核工具</h1>
        <div class="controls">
            <input type="text" id="searchInput" placeholder="搜索菜谱名称...">
            <select id="filterSelect" class="btn btn-outline">
                <option value="all">全部</option>
                <option value="pending">未审核</option>
                <option value="match">已匹配</option>
                <option value="mismatch">不匹配</option>
                <option value="unsure">存疑</option>
            </select>
            <button class="btn btn-secondary" onclick="loadRecipes()">🔄 刷新数据</button>
            <button class="btn btn-primary" onclick="exportResults()">📥 导出结果</button>
        </div>
        <div class="stats" id="stats">
            点击"刷新数据"加载菜谱列表
        </div>
    </div>
    
    <div class="grid" id="grid">
        <div class="empty-state">点击"刷新数据"加载菜谱列表</div>
    </div>

    <script>
        let allRecipes = [];
        let results = {};
        
        // API 地址
        const API_BASE = 'https://express-yi42-246142-8-1421971309.sh.run.tcloudbase.com';
        
        // 从 localStorage 加载结果
        function loadSavedResults() {
            const saved = localStorage.getItem('cover_audit_results');
            if (saved) {
                results = JSON.parse(saved);
            }
        }
        
        // 保存结果到 localStorage
        function saveResults() {
            localStorage.setItem('cover_audit_results', JSON.stringify(results));
        }
        
        // 加载菜谱数据
        async function loadRecipes() {
            const grid = document.getElementById('grid');
            grid.innerHTML = '<div class="empty-state">加载中...</div>';
            
            try {
                const resp = await fetch(API_BASE + '/api/recipe/list?page=1&pageSize=200');
                const data = await resp.json();
                allRecipes = data.data || [];
                
                // 按是否有封面过滤 (只显示 pixabay 的)
                allRecipes = allRecipes.filter(r => r.cover && r.cover.includes('pixabay'));
                
                renderGrid(allRecipes);
                updateStats();
            } catch (e) {
                grid.innerHTML = '<div class="empty-state">加载失败: ' + e.message + '</div>';
            }
        }
        
        // 渲染网格
        function renderGrid(recipes) {
            const grid = document.getElementById('grid');
            const search = document.getElementById('searchInput').value.toLowerCase();
            const filter = document.getElementById('filterSelect').value;
            
            let filtered = recipes.filter(r => {
                if (search && !r.title.toLowerCase().includes(search)) return false;
                if (filter !== 'all') {
                    const status = results[r.id] || 'pending';
                    if (filter !== status) return false;
                }
                return true;
            });
            
            if (filtered.length === 0) {
                grid.innerHTML = '<div class="empty-state">没有找到菜谱</div>';
                return;
            }
            
            grid.innerHTML = filtered.map(r => {
                const status = results[r.id] || 'pending';
                return '<div class="card" data-status="' + status + '">' +
                    '<img src="' + r.cover + '" alt="' + r.title + '" ' +
                    'onerror="this.src=\'data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 100 100%22><rect fill=%22%23eee%22 width=%22100%22 height=%22100%22/><text x=%2250%22 y=%2255%22 text-anchor=%22middle%22 fill=%22%23999%22>无图</text></svg>\'">' +
                    '<div class="card-body">' +
                    '<div class="card-title" title="' + r.title + '">' + r.title + '</div>' +
                    '<div class="card-meta">ID: ' + r.id + '</div>' +
                    '<div class="card-actions">' +
                    '<button class="btn btn-match" onclick="setStatus(' + r.id + ', \'match\')">✅ 匹配</button>' +
                    '<button class="btn btn-mismatch" onclick="setStatus(' + r.id + ', \'mismatch\')">❌ 不匹配</button>' +
                    '<button class="btn btn-unsure" onclick="setStatus(' + r.id + ', \'unsure\')">❓ 存疑</button>' +
                    '</div></div></div>';
            }).join('');
        }
        
        // 设置状态
        function setStatus(id, status) {
            results[id] = status;
            saveResults();
            updateStats();
            renderGrid(allRecipes);
        }
        
        // 更新统计
        function updateStats() {
            const total = allRecipes.length;
            const match = Object.values(results).filter(v => v === 'match').length;
            const mismatch = Object.values(results).filter(v => v === 'mismatch').length;
            const unsure = Object.values(results).filter(v => v === 'unsure').length;
            const pending = total - match - mismatch - unsure;
            
            document.getElementById('stats').innerHTML = 
                '总计: ' + total + ' 道 | 已审核: ' + (match + mismatch + unsure) + 
                ' | ✅ 匹配: ' + match + ' | ❌ 不匹配: ' + mismatch + 
                ' | ❓ 存疑: ' + unsure + ' | ⏳ 待审核: ' + pending;
        }
        
        // 导出结果
        function exportResults() {
            const mismatchRecipes = allRecipes.filter(r => results[r.id] === 'mismatch');
            const data = {
                exportTime: new Date().toISOString(),
                totalReviewed: Object.keys(results).length,
                summary: {
                    match: Object.values(results).filter(v => v === 'match').length,
                    mismatch: Object.values(results).filter(v => v === 'mismatch').length,
                    unsure: Object.values(results).filter(v => v === 'unsure').length,
                },
                mismatchList: mismatchRecipes.map(r => ({
                    id: r.id,
                    title: r.title,
                    cover: r.cover,
                })),
            };
            
            const blob = new Blob([JSON.stringify(data, null, 2)], { type: 'application/json' });
            const url = URL.createObjectURL(blob);
            const a = document.createElement('a');
            a.href = url;
            a.download = 'cover_audit_' + new Date().toISOString().slice(0,10) + '.json';
            a.click();
            URL.revokeObjectURL(url);
        }
        
        // 事件监听
        document.getElementById('searchInput').addEventListener('input', () => renderGrid(allRecipes));
        document.getElementById('filterSelect').addEventListener('change', () => renderGrid(allRecipes));
        
        // 初始化
        loadSavedResults();
    </script>
</body>
</html>
