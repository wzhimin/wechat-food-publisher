<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>非菜谱清理 - 味可觅后台</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      background: #f5f7fa;
      min-height: 100vh;
    }
    .sidebar {
      position: fixed;
      left: 0;
      top: 0;
      width: 220px;
      height: 100vh;
      background: #2c3e50;
      color: white;
      padding: 20px 0;
    }
    .sidebar h2 {
      padding: 0 20px 20px;
      font-size: 18px;
      border-bottom: 1px solid rgba(255,255,255,0.1);
    }
    .sidebar a {
      display: block;
      padding: 12px 20px;
      color: rgba(255,255,255,0.8);
      text-decoration: none;
    }
    .sidebar a:hover, .sidebar a.active {
      background: rgba(255,255,255,0.1);
      color: white;
    }
    .sidebar .logout {
      position: absolute;
      bottom: 20px;
      width: 100%;
      padding: 12px 20px;
      color: rgba(255,255,255,0.6);
      cursor: pointer;
    }
    .sidebar .logout:hover { color: white; }
    
    .main-content {
      margin-left: 220px;
      padding: 30px;
    }
    .page-header { margin-bottom: 20px; }
    .page-header h1 { font-size: 24px; margin-bottom: 8px; }
    .page-header p { color: #666; }
    
    .alert-box {
      background: #fff3cd;
      border: 1px solid #ffc107;
      border-radius: 8px;
      padding: 16px;
      margin-bottom: 20px;
      color: #856404;
    }
    
    .toolbar {
      background: white;
      padding: 16px;
      border-radius: 8px;
      margin-bottom: 20px;
      display: flex;
      gap: 12px;
      align-items: center;
    }
    .btn {
      padding: 8px 16px;
      border: none;
      border-radius: 6px;
      cursor: pointer;
      font-size: 14px;
    }
    .btn-primary { background: #3498db; color: white; }
    .btn-danger { background: #e74c3c; color: white; }
    .btn-secondary { background: #95a5a6; color: white; }
    .btn:hover { opacity: 0.9; }
    .btn:disabled { opacity: 0.5; cursor: not-allowed; }
    
    .stats-row {
      background: white;
      padding: 16px;
      border-radius: 8px;
      margin-bottom: 20px;
      display: flex;
      gap: 24px;
    }
    .stats-row span { color: #666; }
    .stats-row strong { color: #2c3e50; font-size: 18px; }
    
    .recipe-table {
      background: white;
      border-radius: 8px;
      overflow: hidden;
    }
    table { width: 100%; border-collapse: collapse; }
    th, td { padding: 12px 16px; text-align: left; border-bottom: 1px solid #eee; }
    th { background: #f8f9fa; font-weight: 500; }
    .recipe-title { max-width: 300px; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
    .recipe-cover { 
      width: 60px; 
      height: 60px; 
      object-fit: cover; 
      border-radius: 6px; 
      background: #f0f0f0;
    }
    .reason-tag {
      display: inline-block;
      padding: 2px 8px;
      background: #fee;
      color: #c00;
      border-radius: 4px;
      font-size: 12px;
      margin: 2px;
    }
    .status-tag {
      display: inline-block;
      padding: 2px 8px;
      border-radius: 4px;
      font-size: 12px;
      margin: 2px;
    }
    .status-ok { background: #d4edda; color: #155724; }
    .status-warn { background: #fff3cd; color: #856404; }
    .status-error { background: #f8d7da; color: #721c24; }
    
    .checkbox-cell { width: 40px; }
    .checkbox-cell input { width: 18px; height: 18px; cursor: pointer; }
    
    .empty { text-align: center; padding: 40px; color: #999; }
    .loading { text-align: center; padding: 40px; }
    
    .pagination {
      display: flex;
      justify-content: center;
      align-items: center;
      gap: 8px;
      padding: 20px;
      border-top: 1px solid #eee;
    }
    .pagination button, .pagination span {
      padding: 8px 12px;
      border: 1px solid #ddd;
      background: white;
      border-radius: 4px;
      cursor: pointer;
    }
    .pagination button:hover { background: #f5f5f5; }
    .pagination button:disabled { opacity: 0.5; cursor: not-allowed; }
    .pagination .current {
      background: #e74c3c;
      color: white;
      border-color: #e74c3c;
    }
    
    #selectAll { cursor: pointer; }
  </style>
</head>
<body>
  <div class="sidebar">
    <h2>👔 味可觅后台</h2>
    <a href="index.html">📊 概览</a>
    <a href="comments.html">💬 评论审核</a>
    <a href="recipes.html">📖 菜谱管理</a>
    <a href="feedbacks.html">📝 用户反馈</a>
    <a href="users.html">👥 用户管理</a>
    <a href="non-dishes.html" class="active">🗑️ 非菜谱清理</a>
    <div class="logout" onclick="logout()">退出登录</div>
  </div>
  
  <div class="main-content">
    <div class="page-header">
      <h1>🗑️ 非菜谱清理</h1>
      <p>识别可能是非菜谱的内容（纯食材、小贴士、文章等），支持批量删除</p>
    </div>
    
    <div class="alert-box">
      ⚠️ 删除操作不可恢复！请仔细检查后再删除。系统会根据标题关键词自动识别，可能存在误判。
    </div>
    
    <div class="stats-row" id="statsRow">
      加载中...
    </div>
    
    <div class="toolbar">
      <button class="btn btn-primary" onclick="loadNonDishes()">刷新列表</button>
      <button class="btn btn-danger" id="deleteBtn" onclick="batchDelete()" disabled>批量删除选中</button>
      <span id="selectedCount" style="color:#666;margin-left:auto;">已选 0 条</span>
    </div>
    
    <div class="recipe-table">
      <table>
        <thead>
          <tr>
            <th class="checkbox-cell"><input type="checkbox" id="selectAll" onchange="toggleSelectAll()"></th>
            <th>封面</th>
            <th>标题</th>
            <th>问题</th>
            <th>食材/步骤</th>
            <th>创建时间</th>
          </tr>
        </thead>
        <tbody id="recipeList">
          <tr><td colspan="6" class="loading">加载中...</td></tr>
        </tbody>
      </table>
      <div class="pagination" id="pagination"></div>
    </div>
  </div>

  <script>
    const API_BASE = window.location.origin + '/api';
    let token = localStorage.getItem('admin_token') || '';
    let currentPage = 1;
    let pageSize = 20;
    let totalCount = 0;
    let allRecipes = [];
    let selectedIds = new Set();
    
    if (!token) {
      location.href = 'index.html';
    }
    
    loadNonDishes();
    
    async function loadNonDishes() {
      const listEl = document.getElementById('recipeList');
      listEl.innerHTML = '<tr><td colspan="6" class="loading">加载中...</td></tr>';
      selectedIds.clear();
      updateSelectedCount();
      
      try {
        const res = await fetch(`${API_BASE}/admin/recipes/non-dishes?token=${token}&page=${currentPage}&pageSize=${pageSize}`);
        if (res.status === 401) {
          localStorage.removeItem('admin_token');
          location.href = 'index.html';
          return;
        }
        const data = await res.json();
        allRecipes = data.data || [];
        totalCount = data.total || 0;
        
        const totalPages = Math.ceil(totalCount / pageSize);
        document.getElementById('statsRow').innerHTML = `
          <span>疑似非菜谱 <strong>${totalCount}</strong> 条</span>
          <span>第 <strong>${currentPage}</strong> / <strong>${totalPages || 1}</strong> 页</span>
        `;
        
        if (!allRecipes.length) {
          listEl.innerHTML = '<tr><td colspan="6" class="empty">🎉 未发现疑似非菜谱内容</td></tr>';
          document.getElementById('pagination').innerHTML = '';
          return;
        }
        
        listEl.innerHTML = allRecipes.map(r => `
          <tr>
            <td class="checkbox-cell">
              <input type="checkbox" data-id="${r.id}" onchange="toggleSelect(${r.id})">
            </td>
            <td>
              <img class="recipe-cover" src="${getCoverUrl(r.cover)}" alt="" onerror="this.src='https://via.placeholder.com/60?text=No'">
            </td>
            <td class="recipe-title" title="${escapeHtml(r.title)}">${escapeHtml(r.title)}</td>
            <td>
              ${r.reasons.map(re => `<span class="reason-tag">${escapeHtml(re)}</span>`).join('')}
            </td>
            <td>
              <span class="status-tag ${r.hasIngredients ? 'status-ok' : 'status-error'}">${r.ingredientsCount} 食材</span>
              <span class="status-tag ${r.hasSteps ? 'status-ok' : 'status-error'}">${r.stepsCount} 步骤</span>
            </td>
            <td>${formatDate(r.created_at)}</td>
          </tr>
        `).join('');
        
        document.getElementById('selectAll').checked = false;
        renderPagination(totalPages);
      } catch (e) {
        console.error(e);
        listEl.innerHTML = '<tr><td colspan="6" class="empty">网络错误: ' + e.message + '</td></tr>';
      }
    }
    
    function toggleSelect(id) {
      if (selectedIds.has(id)) {
        selectedIds.delete(id);
      } else {
        selectedIds.add(id);
      }
      updateSelectedCount();
    }
    
    function toggleSelectAll() {
      const checked = document.getElementById('selectAll').checked;
      allRecipes.forEach(r => {
        const cb = document.querySelector(`input[data-id="${r.id}"]`);
        if (cb) {
          cb.checked = checked;
          if (checked) {
            selectedIds.add(r.id);
          } else {
            selectedIds.delete(r.id);
          }
        }
      });
      updateSelectedCount();
    }
    
    function updateSelectedCount() {
      const count = selectedIds.size;
      document.getElementById('selectedCount').textContent = `已选 ${count} 条`;
      document.getElementById('deleteBtn').disabled = count === 0;
    }
    
    async function batchDelete() {
      const ids = Array.from(selectedIds);
      if (!ids.length) return;
      
      if (!confirm(`确定删除 ${ids.length} 条菜谱？此操作不可恢复！`)) return;
      if (!confirm('再次确认：删除后无法恢复，确定继续？')) return;
      
      try {
        const res = await fetch(`${API_BASE}/admin/recipes/batch-delete`, {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ token, recipeIds: ids })
        });
        const data = await res.json();
        
        if (data.success) {
          alert(`成功删除 ${data.deleted} 条菜谱`);
          loadNonDishes();
        } else {
          alert(data.error || '删除失败');
        }
      } catch (e) {
        alert('网络错误: ' + e.message);
      }
    }
    
    function renderPagination(totalPages) {
      const el = document.getElementById('pagination');
      if (totalPages <= 1) {
        el.innerHTML = '';
        return;
      }
      
      let html = '';
      html += `<button onclick="goToPage(${currentPage - 1})" ${currentPage === 1 ? 'disabled' : ''}>上一页</button>`;
      
      const start = Math.max(1, currentPage - 2);
      const end = Math.min(totalPages, currentPage + 2);
      
      if (start > 1) {
        html += `<button onclick="goToPage(1)">1</button>`;
        if (start > 2) html += `<span>...</span>`;
      }
      
      for (let i = start; i <= end; i++) {
        html += `<button onclick="goToPage(${i})" class="${i === currentPage ? 'current' : ''}">${i}</button>`;
      }
      
      if (end < totalPages) {
        if (end < totalPages - 1) html += `<span>...</span>`;
        html += `<button onclick="goToPage(${totalPages})">${totalPages}</button>`;
      }
      
      html += `<button onclick="goToPage(${currentPage + 1})" ${currentPage === totalPages ? 'disabled' : ''}>下一页</button>`;
      
      el.innerHTML = html;
    }
    
    function goToPage(page) {
      const totalPages = Math.ceil(totalCount / pageSize);
      if (page < 1 || page > totalPages) return;
      currentPage = page;
      loadNonDishes();
    }
    
    function getCoverUrl(cover) {
      if (!cover) return 'https://via.placeholder.com/60?text=No';
      if (cover.startsWith('http')) return cover;
      return cover;
    }
    
    function formatDate(dateStr) {
      if (!dateStr) return '-';
      const d = new Date(dateStr);
      return `${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}-${String(d.getDate()).padStart(2,'0')}`;
    }
    
    function escapeHtml(str) {
      if (!str) return '';
      return String(str).replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;');
    }
    
    function logout() {
      localStorage.removeItem('admin_token');
      location.href = 'index.html';
    }
  </script>
</body>
</html>
