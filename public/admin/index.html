<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>味可觅 - 后台管理</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      background: #f5f7fa;
      min-height: 100vh;
    }
    
    /* 登录页 */
    .login-container {
      display: flex;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
    }
    .login-box {
      background: white;
      padding: 40px;
      border-radius: 12px;
      box-shadow: 0 4px 20px rgba(0,0,0,0.1);
      width: 400px;
    }
    .login-box h1 { font-size: 24px; margin-bottom: 8px; text-align: center; }
    .login-box p { color: #666; text-align: center; margin-bottom: 30px; }
    .form-group { margin-bottom: 20px; }
    .form-group label { display: block; margin-bottom: 8px; font-weight: 500; }
    .form-group input {
      width: 100%;
      padding: 12px;
      border: 1px solid #ddd;
      border-radius: 8px;
      font-size: 14px;
    }
    .btn {
      width: 100%;
      padding: 12px;
      background: #07c160;
      color: white;
      border: none;
      border-radius: 8px;
      font-size: 16px;
      cursor: pointer;
    }
    .btn:hover { background: #06ad56; }
    .error { color: #e74c3c; font-size: 14px; margin-top: 10px; text-align: center; }
    
    /* 管理面板 */
    .admin-container { display: none; }
    .sidebar {
      position: fixed;
      left: 0;
      top: 0;
      width: 220px;
      height: 100vh;
      background: #2c3e50;
      color: white;
      padding: 20px 0;
    }
    .sidebar h2 {
      padding: 0 20px 20px;
      font-size: 18px;
      border-bottom: 1px solid rgba(255,255,255,0.1);
    }
    .sidebar a {
      display: block;
      padding: 12px 20px;
      color: rgba(255,255,255,0.8);
      text-decoration: none;
    }
    .sidebar a:hover, .sidebar a.active {
      background: rgba(255,255,255,0.1);
      color: white;
    }
    .sidebar .logout {
      position: absolute;
      bottom: 20px;
      width: 100%;
      padding: 12px 20px;
      color: rgba(255,255,255,0.6);
      cursor: pointer;
    }
    .sidebar .logout:hover { color: white; }
    
    .main-content {
      margin-left: 220px;
      padding: 30px;
    }
    .page-header { margin-bottom: 30px; }
    .page-header h1 { font-size: 24px; margin-bottom: 8px; }
    .page-header p { color: #666; }
    
    /* 统计卡片 */
    .stats-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
      gap: 20px;
      margin-bottom: 30px;
    }
    .stat-card {
      background: white;
      padding: 20px;
      border-radius: 12px;
      box-shadow: 0 2px 8px rgba(0,0,0,0.05);
    }
    .stat-card h3 { font-size: 14px; color: #666; margin-bottom: 8px; }
    .stat-card .number { font-size: 32px; font-weight: bold; color: #2c3e50; }
    .stat-card.pending .number { color: #f39c12; }
    .stat-card.success .number { color: #27ae60; }
    
    /* 快捷入口 */
    .quick-actions {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(280px, 1fr));
      gap: 20px;
    }
    .action-card {
      background: white;
      padding: 24px;
      border-radius: 12px;
      box-shadow: 0 2px 8px rgba(0,0,0,0.05);
    }
    .action-card h3 { margin-bottom: 12px; }
    .action-card p { color: #666; font-size: 14px; margin-bottom: 16px; }
    .action-card a {
      display: inline-block;
      padding: 10px 20px;
      background: #3498db;
      color: white;
      text-decoration: none;
      border-radius: 6px;
    }
    .action-card a:hover { background: #2980b9; }
  </style>
</head>
<body>
  <!-- 登录页 -->
  <div class="login-container" id="loginPage">
    <div class="login-box">
      <h1>👔 味可觅后台管理</h1>
      <p>请使用管理员账号登录</p>
      <div class="form-group">
        <label>账号</label>
        <input type="text" id="usernameInput" placeholder="请输入账号">
      </div>
      <div class="form-group">
        <label>密码</label>
        <input type="password" id="passwordInput" placeholder="请输入密码" onkeypress="if(event.key==='Enter')login()">
      </div>
      <button class="btn" onclick="login()">登录</button>
      <p class="error" id="loginError"></p>
    </div>
  </div>
  
  <!-- 管理面板 -->
  <div class="admin-container" id="adminPanel">
    <div class="sidebar">
      <h2>👔 味可觅后台</h2>
      <a href="index.html" class="active">📊 概览</a>
      <a href="comments.html">💬 评论审核</a>
      <a href="recipes.html">📖 菜谱管理</a>
      <a href="feedbacks.html">📝 用户反馈</a>
      <a href="users.html">👥 用户管理</a>
      <a href="non-dishes.html">🗑️ 非菜谱清理</a>
      <div class="logout" onclick="logout()">退出登录</div>
    </div>
    
    <div class="main-content">
      <div class="page-header">
        <h1>📊 概览</h1>
        <p>系统运营数据一览</p>
      </div>
      
      <div class="stats-grid" id="statsGrid">
        <!-- 动态加载 -->
      </div>
      
      <div class="quick-actions">
        <div class="action-card">
          <h3>💬 评论审核</h3>
          <p>审核用户发布的评论内容，支持批量操作</p>
          <a href="comments.html">进入审核</a>
        </div>
        <div class="action-card">
          <h3>📖 菜谱管理</h3>
          <p>管理菜谱状态，设置精选推荐</p>
          <a href="recipes.html">管理菜谱</a>
        </div>
        <div class="action-card">
          <h3>📝 用户反馈</h3>
          <p>查看并回复用户反馈意见</p>
          <a href="feedbacks.html">查看反馈</a>
        </div>
      </div>
    </div>
  </div>

  <script>
    const API_BASE = window.location.origin + '/api';
    let token = localStorage.getItem('admin_token') || '';
    
    // 初始化：检查是否已登录
    if (token) {
      checkAuth();
    }
    
    async function login() {
      const username = document.getElementById('usernameInput').value.trim();
      const password = document.getElementById('passwordInput').value;
      
      if (!username || !password) {
        document.getElementById('loginError').textContent = '请输入账号和密码';
        return;
      }
      
      try {
        const res = await fetch(`${API_BASE}/admin/login`, {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ username, password })
        });
        
        const data = await res.json();
        if (data.success) {
          token = data.token;
          localStorage.setItem('admin_token', token);
          showAdminPanel();
          loadStats();
        } else {
          document.getElementById('loginError').textContent = data.error || '登录失败';
        }
      } catch (e) {
        document.getElementById('loginError').textContent = '网络错误，请重试';
      }
    }
    
    async function checkAuth() {
      try {
        const res = await fetch(`${API_BASE}/admin/stats?token=${token}`);
        if (res.ok) {
          showAdminPanel();
          const data = await res.json();
          renderStats(data.data);
        } else {
          localStorage.removeItem('admin_token');
        }
      } catch (e) {
        // 网络错误，忽略
      }
    }
    
    function showAdminPanel() {
      document.getElementById('loginPage').style.display = 'none';
      document.getElementById('adminPanel').style.display = 'block';
    }
    
    async function loadStats() {
      try {
        const res = await fetch(`${API_BASE}/admin/stats?token=${token}`);
        if (res.ok) {
          const data = await res.json();
          renderStats(data.data);
        }
      } catch (e) {}
    }
    
    function renderStats(stats) {
      const grid = document.getElementById('statsGrid');
      grid.innerHTML = `
        <div class="stat-card pending">
          <h3>待审核评论</h3>
          <div class="number">${stats.comments?.pending || 0}</div>
        </div>
        <div class="stat-card success">
          <h3>已通过评论</h3>
          <div class="number">${stats.comments?.approved || 0}</div>
        </div>
        <div class="stat-card">
          <h3>菜谱总数</h3>
          <div class="number">${stats.recipes?.approved || 0}</div>
        </div>
        <div class="stat-card pending">
          <h3>待处理反馈</h3>
          <div class="number">${stats.feedbacks?.pending || 0}</div>
        </div>
      `;
    }
    
    function logout() {
      localStorage.removeItem('admin_token');
      location.reload();
    }
  </script>
</body>
</html>
