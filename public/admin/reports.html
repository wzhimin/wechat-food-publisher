<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>举报管理 - 味口后台</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      background: #f5f7fa;
      min-height: 100vh;
    }
    .sidebar {
      position: fixed;
      left: 0; top: 0;
      width: 220px; height: 100vh;
      background: #2c3e50;
      color: white;
      padding: 20px 0;
    }
    .sidebar h2 { padding: 0 20px 20px; font-size: 18px; border-bottom: 1px solid rgba(255,255,255,0.1); }
    .sidebar a { display: block; padding: 12px 20px; color: rgba(255,255,255,0.8); text-decoration: none; }
    .sidebar a:hover, .sidebar a.active { background: rgba(255,255,255,0.1); color: white; }
    .sidebar .logout { position: absolute; bottom: 20px; width: 100%; padding: 12px 20px; color: rgba(255,255,255,0.6); cursor: pointer; }
    .sidebar .logout:hover { color: white; }

    .main-content { margin-left: 220px; padding: 30px; }
    .page-header { margin-bottom: 20px; }
    .page-header h1 { font-size: 24px; margin-bottom: 8px; }

    /* 统计行 */
    .stats-row {
      background: white;
      padding: 16px;
      border-radius: 8px;
      margin-bottom: 20px;
      display: flex;
      gap: 24px;
      align-items: center;
    }
    .stats-row .stat-item { display: flex; align-items: baseline; gap: 8px; }
    .stats-row .stat-label { font-size: 14px; color: #888; }
    .stats-row .stat-value { font-size: 22px; font-weight: bold; color: #2c3e50; }
    .stats-row .stat-value.pending { color: #f39c12; }
    .stats-row .stat-value.resolved { color: #27ae60; }
    .stats-row .stat-value.rejected { color: #95a5a6; }

    /* 筛选栏 */
    .filter-bar {
      background: white;
      padding: 16px;
      border-radius: 8px;
      margin-bottom: 20px;
      display: flex;
      gap: 16px;
      align-items: center;
    }
    .filter-bar select {
      padding: 8px 12px;
      border: 1px solid #ddd;
      border-radius: 6px;
    }

    /* 列表 */
    .report-list { display: flex; flex-direction: column; gap: 12px; }
    .report-card {
      background: white;
      padding: 20px;
      border-radius: 8px;
      box-shadow: 0 2px 8px rgba(0,0,0,0.05);
    }
    .report-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 12px;
    }
    .report-meta { display: flex; align-items: center; gap: 12px; }
    .report-meta .type-tag {
      padding: 3px 10px;
      border-radius: 12px;
      font-size: 12px;
      background: #e8f0fe;
      color: #1a73e8;
    }
    .report-meta .time { font-size: 12px; color: #999; }
    .report-status {
      padding: 4px 10px;
      border-radius: 12px;
      font-size: 12px;
    }
    .status-pending { background: #fff3cd; color: #856404; }
    .status-resolved { background: #d4edda; color: #155724; }
    .status-rejected { background: #e2e3e5; color: #383d41; }

    .report-body { display: flex; flex-direction: column; gap: 8px; }
    .report-field { display: flex; gap: 12px; align-items: flex-start; font-size: 14px; }
    .report-field .label { color: #888; min-width: 70px; flex-shrink: 0; }
    .report-field .value { color: #333; }
    .report-target {
      background: #f8f9fa;
      border-radius: 6px;
      padding: 12px;
      margin-top: 4px;
    }
    .report-target img {
      width: 80px;
      height: 80px;
      object-fit: cover;
      border-radius: 6px;
      margin-top: 8px;
    }
    .report-handler { font-size: 12px; color: #888; margin-top: 8px; }

    .report-actions { margin-top: 12px; display: flex; gap: 10px; flex-wrap: wrap; }
    .btn {
      padding: 8px 16px;
      border: none;
      border-radius: 6px;
      cursor: pointer;
      font-size: 14px;
    }
    .btn-primary { background: #27ae60; color: white; }
    .btn-danger { background: #e74c3c; color: white; }
    .btn-secondary { background: #95a5a6; color: white; }
    .btn:hover { opacity: 0.9; }

    .empty { text-align: center; padding: 40px; color: #999; }
    .loading { text-align: center; padding: 40px; color: #999; }

    /* 分页 */
    .pagination {
      display: flex;
      justify-content: center;
      align-items: center;
      gap: 8px;
      padding: 20px;
      background: white;
      border-top: 1px solid #eee;
    }
    .pagination button, .pagination span {
      padding: 8px 12px;
      border: 1px solid #ddd;
      background: white;
      border-radius: 4px;
      cursor: pointer;
    }
    .pagination button:hover { background: #f5f5f5; }
    .pagination button:disabled { opacity: 0.5; cursor: not-allowed; }
    .pagination .current { background: #3498db; color: white; border-color: #3498db; }

    /* 处理弹窗 */
    .modal {
      display: none;
      position: fixed;
      top: 0; left: 0;
      width: 100%; height: 100%;
      background: rgba(0,0,0,0.5);
      z-index: 1000;
      align-items: center;
      justify-content: center;
    }
    .modal.show { display: flex; }
    .modal-content {
      background: white;
      padding: 24px;
      border-radius: 12px;
      width: 480px;
      max-height: 80vh;
      overflow-y: auto;
    }
    .modal-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 20px;
    }
    .modal-header h3 { font-size: 18px; }
    .modal-close { font-size: 24px; cursor: pointer; color: #999; }
    .modal-body { font-size: 14px; color: #666; line-height: 1.6; margin-bottom: 16px; }
    .form-group { margin-bottom: 16px; }
    .form-group label { display: block; margin-bottom: 6px; font-weight: 500; }
    .form-group textarea {
      width: 100%;
      padding: 10px;
      border: 1px solid #ddd;
      border-radius: 6px;
      min-height: 80px;
      resize: vertical;
      font-family: inherit;
    }
    .modal-footer {
      margin-top: 20px;
      display: flex;
      gap: 10px;
      justify-content: flex-end;
    }
  </style>
</head>
<body>
  <div class="sidebar">
    <h2>👔 味口后台</h2>
    <a href="index.html">📊 概览</a>
    <a href="comments.html">💬 评论管理</a>
    <a href="recipes.html">📖 菜谱管理</a>
    <a href="feedbacks.html">📝 用户反馈</a>
    <a href="users.html">👥 用户管理</a>
    <a href="non-dishes.html">🗑️ 非菜谱清理</a>
    <a href="reports.html" class="active">🚫 举报管理</a>
    <a href="published-articles.html">📋 选题记录</a>
    <div class="logout" onclick="logout()">退出登录</div>
  </div>

  <div class="main-content">
    <div class="page-header">
      <h1>🚫 举报管理</h1>
    </div>

    <div class="stats-row" id="statsRow">
      <div class="stat-item">
        <span class="stat-label">待处理</span>
        <span class="stat-value pending" id="stat-pending">—</span>
      </div>
      <div class="stat-item">
        <span class="stat-label">已处理</span>
        <span class="stat-value resolved" id="stat-resolved">—</span>
      </div>
      <div class="stat-item">
        <span class="stat-label">已驳回</span>
        <span class="stat-value rejected" id="stat-rejected">—</span>
      </div>
      <div class="stat-item">
        <span class="stat-label">总计</span>
        <span class="stat-value" id="stat-total">—</span>
      </div>
    </div>

    <div class="filter-bar">
      <label>状态：</label>
      <select id="filterStatus" onchange="changeFilter()">
        <option value="pending">待处理</option>
        <option value="resolved">已处理</option>
        <option value="rejected">已驳回</option>
        <option value="all">全部</option>
      </select>
      <label style="margin-left:12px">时间：</label>
      <input type="date" id="startDate" onchange="loadList()">
      <span>~</span>
      <input type="date" id="endDate" onchange="loadList()">
      <label style="margin-left:12px">排序：</label>
      <select id="sortBy" onchange="loadList()">
        <option value="created_at">创建时间</option>
        <option value="handled_at">处理时间</option>
      </select>
      <select id="sortOrder" onchange="loadList()">
        <option value="DESC">最新优先</option>
        <option value="ASC">最早优先</option>
      </select>
    </div>

    <div class="report-list" id="reportList">
      <div class="loading">加载中...</div>
    </div>

    <div class="pagination" id="pagination"></div>
  </div>

  <!-- 处理弹窗 -->
  <div class="modal" id="handleModal">
    <div class="modal-content">
      <div class="modal-header">
        <h3>处理举报</h3>
        <span class="modal-close" onclick="closeModal()">&times;</span>
      </div>
      <div class="modal-body" id="modalBody"></div>
      <div class="form-group">
        <label>处理结果说明（可选）</label>
        <textarea id="handleResult" placeholder="简要说明处理依据..."></textarea>
      </div>
      <div class="modal-footer">
        <button class="btn btn-secondary" onclick="closeModal()">取消</button>
        <button class="btn btn-danger" onclick="handleReport('approve')">通过举报（删除内容）</button>
        <button class="btn btn-primary" onclick="handleReport('reject')">驳回举报</button>
      </div>
    </div>
  </div>

  <script>
    const API_BASE = window.location.origin + '/api';
    let token = localStorage.getItem('admin_token') || '';
    let currentPage = 1;
    let pageSize = 20;
    let totalCount = 0;
    let currentReportId = null;

    if (!token) {
      location.href = 'index.html';
    }

    loadStats();
    loadList();

    async function loadStats() {
      try {
        const res = await fetch(`${API_BASE}/admin/reports/stats?token=${token}`);
        if (res.status === 401) { handleUnauthorized(); return; }
        const data = await res.json();
        if (data.success) {
          document.getElementById('stat-pending').textContent = data.data.pending;
          document.getElementById('stat-resolved').textContent = data.data.resolved;
          document.getElementById('stat-rejected').textContent = data.data.rejected;
          document.getElementById('stat-total').textContent = data.data.total;
        }
      } catch (e) {}
    }

    async function loadList() {
      const status = document.getElementById('filterStatus').value;
      const listEl = document.getElementById('reportList');
      listEl.innerHTML = '<div class="loading">加载中...</div>';

      try {
        const sortBy = document.getElementById('sortBy').value;
        const sortOrder = document.getElementById('sortOrder').value;
        const startDate = document.getElementById('startDate').value;
        const endDate = document.getElementById('endDate').value;
        const params = new URLSearchParams({ token, status, page: currentPage, pageSize, sortBy, sortOrder });
        if (startDate) params.set('startDate', startDate);
        if (endDate) params.set('endDate', endDate);
        const res = await fetch(`${API_BASE}/admin/reports/list?${params.toString()}`);
        if (res.status === 401) { handleUnauthorized(); return; }
        const data = await res.json();
        if (!data.success) { listEl.innerHTML = '<div class="empty">加载失败：' + escapeHtml(data.error || '') + '</div>'; return; }

        totalCount = data.total || 0;
        const reports = data.data || [];

        if (!reports.length) {
          listEl.innerHTML = '<div class="empty">暂无举报</div>';
          renderPagination();
          return;
        }

        listEl.innerHTML = reports.map(r => {
          const typeLabel = r.type === 'recipe' ? '菜谱' : '评论';
          const reporterName = r.reporter?.nickName || '未知用户';

          let targetHtml = '';
          if (r.target) {
            if (r.type === 'recipe') {
              targetHtml = `
                <div class="report-target">
                  <div>菜谱：${escapeHtml(r.target.title || '（已删除）')}</div>
                  ${r.target.cover ? `<img src="${r.target.cover}" alt="" onerror="this.style.display='none'">` : ''}
                </div>`;
            } else {
              targetHtml = `
                <div class="report-target">
                  <div>评论：${escapeHtml((r.target.content || '').substring(0, 80))}</div>
                  ${r.target.recipe ? `<div style="color:#888;font-size:12px;margin-top:4px;">所属菜谱：${escapeHtml(r.target.recipe.title || '')}</div>` : ''}
                </div>`;
            }
          }

          let actionsHtml = '';
          if (r.status === 'pending') {
            actionsHtml = `
              <div class="report-actions">
                <button class="btn btn-primary" onclick="showHandleModal(${r.id}, '${r.type}')">处理</button>
              </div>`;
          } else {
            actionsHtml = `
              <div class="report-handler">由 ${escapeHtml(r.handled_by || '')} 处理 ${r.handled_at ? '于 ' + formatDate(r.handled_at) : ''}</div>`;
          }

          return `
            <div class="report-card">
              <div class="report-header">
                <div class="report-meta">
                  <span class="type-tag">${typeLabel}</span>
                  <span class="time">${formatDateTime(r.created_at)}</span>
                </div>
                <span class="report-status status-${r.status}">${getStatusText(r.status)}</span>
              </div>
              <div class="report-body">
                <div class="report-field">
                  <span class="label">举报人</span>
                  <span class="value">${escapeHtml(reporterName)}</span>
                </div>
                <div class="report-field">
                  <span class="label">举报原因</span>
                  <span class="value">${escapeHtml(r.reason || '')}</span>
                </div>
                ${r.detail ? `
                <div class="report-field">
                  <span class="label">补充说明</span>
                  <span class="value">${escapeHtml(r.detail)}</span>
                </div>` : ''}
                <div class="report-field">
                  <span class="label">举报对象</span>
                  <span class="value">${targetHtml}</span>
                </div>
                ${r.result ? `
                <div class="report-field">
                  <span class="label">处理结果</span>
                  <span class="value">${escapeHtml(r.result)}</span>
                </div>` : ''}
              </div>
              ${actionsHtml}
            </div>
          `;
        }).join('');

        renderPagination();
      } catch (e) {
        listEl.innerHTML = '<div class="empty">网络错误</div>';
      }
    }

    function changeFilter() {
      currentPage = 1;
      loadList();
    }

    function showHandleModal(reportId, type) {
      currentReportId = reportId;
      document.getElementById('handleResult').value = '';
      document.getElementById('modalBody').innerHTML = `
        <p>请选择处理方式：</p>
        <ul style="margin:12px 0 0 20px;line-height:1.8;">
          <li><strong style="color:#27ae60">通过举报</strong>：删除对应内容（菜谱或评论）</li>
          <li><strong style="color:#e74c3c">驳回举报</strong>：内容保留，举报标记为不成立</li>
        </ul>
      `;
      document.getElementById('handleModal').classList.add('show');
    }

    function closeModal() {
      document.getElementById('handleModal').classList.remove('show');
    }

    async function handleReport(action) {
      const result = document.getElementById('handleResult').value.trim();
      try {
        const res = await fetch(`${API_BASE}/admin/reports/resolve?token=${token}`, {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ reportId: currentReportId, action, result })
        });
        const data = await res.json();
        if (data.success) {
          closeModal();
          loadStats();
          loadList();
        } else {
          alert(data.error || '操作失败');
        }
      } catch (e) {
        alert('网络错误');
      }
    }

    function renderPagination() {
      const totalPages = Math.ceil(totalCount / pageSize);
      const el = document.getElementById('pagination');
      if (totalPages <= 1) { el.innerHTML = ''; return; }

      let html = `<button onclick="goToPage(${currentPage - 1})" ${currentPage === 1 ? 'disabled' : ''}>上一页</button>`;
      const start = Math.max(1, currentPage - 2);
      const end = Math.min(totalPages, currentPage + 2);
      if (start > 1) {
        html += `<button onclick="goToPage(1)">1</button>`;
        if (start > 2) html += `<span>...</span>`;
      }
      for (let i = start; i <= end; i++) {
        html += `<button onclick="goToPage(${i})" ${i === currentPage ? 'class="current"' : ''}>${i}</button>`;
      }
      if (end < totalPages) {
        if (end < totalPages - 1) html += `<span>...</span>`;
        html += `<button onclick="goToPage(${totalPages})">${totalPages}</button>`;
      }
      html += `<button onclick="goToPage(${currentPage + 1})" ${currentPage === totalPages ? 'disabled' : ''}>下一页</button>`;
      el.innerHTML = html;
    }

    function goToPage(page) {
      const totalPages = Math.ceil(totalCount / pageSize);
      if (page < 1 || page > totalPages) return;
      currentPage = page;
      loadList();
    }

    function handleUnauthorized() {
      localStorage.removeItem('admin_token');
      location.href = 'index.html';
    }

    function getStatusText(status) {
      return { pending: '待处理', resolved: '已处理', rejected: '已驳回' }[status] || status;
    }

    function formatDate(dateStr) {
      if (!dateStr) return '—';
      const d = new Date(dateStr);
      return `${d.getFullYear()}-${pad(d.getMonth()+1)}-${pad(d.getDate())}`;
    }

    function formatDateTime(dateStr) {
      if (!dateStr) return '—';
      const d = new Date(dateStr);
      return `${d.getFullYear()}-${pad(d.getMonth()+1)}-${pad(d.getDate())} ${pad(d.getHours())}:${pad(d.getMinutes())}:${pad(d.getSeconds())}`;
    }

    function pad(n) { return n < 10 ? '0' + n : n; }

    function escapeHtml(str) {
      if (!str) return '';
      return String(str).replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;');
    }

    function logout() {
      localStorage.removeItem('admin_token');
      location.href = 'index.html';
    }
  </script>
</body>
</html>
