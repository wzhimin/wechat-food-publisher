<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>用户管理 - 味可觅后台</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      background: #f5f7fa;
      min-height: 100vh;
    }
    .sidebar {
      position: fixed;
      left: 0;
      top: 0;
      width: 220px;
      height: 100vh;
      background: #2c3e50;
      color: white;
      padding: 20px 0;
    }
    .sidebar h2 {
      padding: 0 20px 20px;
      font-size: 18px;
      border-bottom: 1px solid rgba(255,255,255,0.1);
    }
    .sidebar a {
      display: block;
      padding: 12px 20px;
      color: rgba(255,255,255,0.8);
      text-decoration: none;
    }
    .sidebar a:hover, .sidebar a.active {
      background: rgba(255,255,255,0.1);
      color: white;
    }
    .sidebar .logout {
      position: absolute;
      bottom: 20px;
      width: 100%;
      padding: 12px 20px;
      color: rgba(255,255,255,0.6);
      cursor: pointer;
    }
    .sidebar .logout:hover { color: white; }
    
    .main-content {
      margin-left: 220px;
      padding: 30px;
    }
    .page-header { margin-bottom: 20px; }
    .page-header h1 { font-size: 24px; margin-bottom: 8px; }
    
    .stats-row {
      background: white;
      padding: 16px;
      border-radius: 8px;
      margin-bottom: 20px;
      display: flex;
      gap: 24px;
    }
    .stats-row span { color: #666; }
    .stats-row strong { color: #2c3e50; font-size: 18px; }
    
    .user-table {
      background: white;
      border-radius: 8px;
      overflow: hidden;
    }
    table { width: 100%; border-collapse: collapse; }
    th, td { padding: 12px 16px; text-align: left; border-bottom: 1px solid #eee; }
    th { background: #f8f9fa; font-weight: 500; }
    .user-info { display: flex; align-items: center; gap: 12px; }
    .user-avatar { 
      width: 40px; 
      height: 40px; 
      border-radius: 50%; 
      background: #e0e0e0;
    }
    .user-name { font-weight: 500; }
    .user-id { font-size: 12px; color: #999; }
    
    .empty { text-align: center; padding: 40px; color: #999; }
    .loading { text-align: center; padding: 40px; }
    
    .pagination {
      display: flex;
      justify-content: center;
      align-items: center;
      gap: 8px;
      padding: 20px;
      border-top: 1px solid #eee;
    }
    .pagination button, .pagination span {
      padding: 8px 12px;
      border: 1px solid #ddd;
      background: white;
      border-radius: 4px;
      cursor: pointer;
    }
    .pagination button:hover { background: #f5f5f5; }
    .pagination button:disabled { opacity: 0.5; cursor: not-allowed; }
    .pagination .current {
      background: #3498db;
      color: white;
      border-color: #3498db;
    }
  </style>
</head>
<body>
  <div class="sidebar">
    <h2>👔 味可觅后台</h2>
    <a href="index.html">📊 概览</a>
    <a href="comments.html">💬 评论审核</a>
    <a href="recipes.html">📖 菜谱管理</a>
    <a href="feedbacks.html">📝 用户反馈</a>
    <a href="users.html" class="active">👥 用户管理</a>
    <a href="non-dishes.html">🗑️ 非菜谱清理</a>
    <div class="logout" onclick="logout()">退出登录</div>
  </div>
  
  <div class="main-content">
    <div class="page-header">
      <h1>👥 用户管理</h1>
    </div>
    
    <div class="stats-row" id="statsRow">
      加载中...
    </div>
    
    <div class="user-table">
      <table>
        <thead>
          <tr>
            <th>用户</th>
            <th>发布菜谱</th>
            <th>收藏</th>
            <th>点赞</th>
            <th>笔记</th>
            <th>注册时间</th>
          </tr>
        </thead>
        <tbody id="userList">
          <tr><td colspan="6" class="loading">加载中...</td></tr>
        </tbody>
      </table>
      <div class="pagination" id="pagination"></div>
    </div>
  </div>

  <script>
    const API_BASE = window.location.origin + '/api';
    let token = localStorage.getItem('admin_token') || '';
    let currentPage = 1;
    let pageSize = 20;
    let totalCount = 0;
    
    if (!token) {
      location.href = 'index.html';
    }
    
    loadUsers();
    
    async function loadUsers() {
      const listEl = document.getElementById('userList');
      listEl.innerHTML = '<tr><td colspan="6" class="loading">加载中...</td></tr>';
      
      try {
        const res = await fetch(`${API_BASE}/admin/users/list?token=${token}&page=${currentPage}&pageSize=${pageSize}`);
        if (res.status === 401) {
          localStorage.removeItem('admin_token');
          location.href = 'index.html';
          return;
        }
        const data = await res.json();
        const users = data.data || [];
        totalCount = data.total || users.length;
        
        const totalPages = Math.ceil(totalCount / pageSize);
        document.getElementById('statsRow').innerHTML = `
          <span>共 <strong>${totalCount}</strong> 位用户</span>
          <span>第 <strong>${currentPage}</strong> / <strong>${totalPages || 1}</strong> 页</span>
        `;
        
        if (!users.length) {
          listEl.innerHTML = '<tr><td colspan="6" class="empty">暂无用户</td></tr>';
          document.getElementById('pagination').innerHTML = '';
          return;
        }
        
        listEl.innerHTML = users.map(u => `
          <tr>
            <td>
              <div class="user-info">
                <img class="user-avatar" src="${u.avatarUrl || 'https://via.placeholder.com/40'}" onerror="this.src='https://via.placeholder.com/40'">
                <div>
                  <div class="user-name">${escapeHtml(u.nickName || '未设置昵称')}</div>
                  <div class="user-id">${u.openid ? u.openid.slice(0, 20) + '...' : '-'}</div>
                </div>
              </div>
            </td>
            <td>${u.recipeCount || 0}</td>
            <td>${u.collectCount || 0}</td>
            <td>${u.likeCount || 0}</td>
            <td>${u.noteCount || 0}</td>
            <td>${formatDate(u.created_at)}</td>
          </tr>
        `).join('');
        
        renderPagination(totalPages);
      } catch (e) {
        console.error(e);
        listEl.innerHTML = '<tr><td colspan="6" class="empty">网络错误: ' + e.message + '</td></tr>';
      }
    }
    
    function renderPagination(totalPages) {
      const el = document.getElementById('pagination');
      if (totalPages <= 1) {
        el.innerHTML = '';
        return;
      }
      
      let html = '';
      html += `<button onclick="goToPage(${currentPage - 1})" ${currentPage === 1 ? 'disabled' : ''}>上一页</button>`;
      
      const start = Math.max(1, currentPage - 2);
      const end = Math.min(totalPages, currentPage + 2);
      
      if (start > 1) {
        html += `<button onclick="goToPage(1)">1</button>`;
        if (start > 2) html += `<span>...</span>`;
      }
      
      for (let i = start; i <= end; i++) {
        html += `<button onclick="goToPage(${i})" class="${i === currentPage ? 'current' : ''}">${i}</button>`;
      }
      
      if (end < totalPages) {
        if (end < totalPages - 1) html += `<span>...</span>`;
        html += `<button onclick="goToPage(${totalPages})">${totalPages}</button>`;
      }
      
      html += `<button onclick="goToPage(${currentPage + 1})" ${currentPage === totalPages ? 'disabled' : ''}>下一页</button>`;
      
      el.innerHTML = html;
    }
    
    function goToPage(page) {
      const totalPages = Math.ceil(totalCount / pageSize);
      if (page < 1 || page > totalPages) return;
      currentPage = page;
      loadUsers();
    }
    
    function formatDate(dateStr) {
      if (!dateStr) return '-';
      const d = new Date(dateStr);
      return `${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}-${String(d.getDate()).padStart(2,'0')}`;
    }
    
    function escapeHtml(str) {
      if (!str) return '';
      return String(str).replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;');
    }
    
    function logout() {
      localStorage.removeItem('admin_token');
      location.href = 'index.html';
    }
  </script>
</body>
</html>
