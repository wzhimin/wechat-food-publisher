<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>用户管理 - 味可觅后台</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      background: #f5f7fa;
      min-height: 100vh;
    }
    .sidebar {
      position: fixed;
      left: 0;
      top: 0;
      width: 220px;
      height: 100vh;
      background: #2c3e50;
      color: white;
      padding: 20px 0;
    }
    .sidebar h2 {
      padding: 0 20px 20px;
      font-size: 18px;
      border-bottom: 1px solid rgba(255,255,255,0.1);
    }
    .sidebar a {
      display: block;
      padding: 12px 20px;
      color: rgba(255,255,255,0.8);
      text-decoration: none;
    }
    .sidebar a:hover, .sidebar a.active {
      background: rgba(255,255,255,0.1);
      color: white;
    }
    .sidebar .logout {
      position: absolute;
      bottom: 20px;
      width: 100%;
      padding: 12px 20px;
      color: rgba(255,255,255,0.6);
      cursor: pointer;
    }
    .sidebar .logout:hover { color: white; }
    
    .main-content {
      margin-left: 220px;
      padding: 30px;
    }
    .page-header { margin-bottom: 20px; }
    .page-header h1 { font-size: 24px; margin-bottom: 8px; }
    
    .stats-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
      gap: 20px;
      margin-bottom: 30px;
    }
    .stat-card {
      background: white;
      padding: 20px;
      border-radius: 12px;
      box-shadow: 0 2px 8px rgba(0,0,0,0.05);
    }
    .stat-card h3 { font-size: 14px; color: #666; margin-bottom: 8px; }
    .stat-card .number { font-size: 32px; font-weight: bold; color: #2c3e50; }
    
    .filter-bar {
      background: white;
      padding: 16px;
      border-radius: 8px;
      margin-bottom: 20px;
      display: flex;
      gap: 16px;
      align-items: center;
      flex-wrap: wrap;
    }
    .filter-bar input {
      padding: 8px 12px;
      border: 1px solid #ddd;
      border-radius: 6px;
      flex: 1;
      min-width: 200px;
    }
    
    .user-table {
      background: white;
      border-radius: 8px;
      overflow: hidden;
      box-shadow: 0 2px 8px rgba(0,0,0,0.05);
    }
    table { width: 100%; border-collapse: collapse; }
    th, td { padding: 12px 16px; text-align: left; border-bottom: 1px solid #eee; }
    th { background: #f8f9fa; font-weight: 500; }
    .user-avatar { 
      width: 40px; 
      height: 40px; 
      border-radius: 50%; 
      object-fit: cover;
      background: #f0f0f0;
    }
    .btn {
      padding: 6px 12px;
      border: none;
      border-radius: 4px;
      cursor: pointer;
      font-size: 13px;
    }
    .btn-sm { padding: 4px 8px; font-size: 12px; }
    .btn-primary { background: #27ae60; color: white; }
    .btn-danger { background: #e74c3c; color: white; }
    .btn-secondary { background: #95a5a6; color: white; }
    .btn:hover { opacity: 0.9; }
    
    .empty { text-align: center; padding: 40px; color: #999; }
    .loading { text-align: center; padding: 40px; }
    
    .status-badge {
      padding: 4px 10px;
      border-radius: 12px;
      font-size: 12px;
    }
    .status-active { background: #d4edda; color: #155724; }
    .status-banned { background: #f8d7da; color: #721c24; }
  </style>
</head>
<body>
  <div class="sidebar">
    <h2>👔 味可觅后台</h2>
    <a href="index.html">📊 概览</a>
    <a href="comments.html">💬 评论审核</a>
    <a href="recipes.html">📖 菜谱管理</a>
    <a href="feedbacks.html">📝 用户反馈</a>
    <a href="users.html" class="active">👥 用户管理</a>
    <div class="logout" onclick="logout()">退出登录</div>
  </div>
  
  <div class="main-content">
    <div class="page-header">
      <h1>👥 用户管理</h1>
    </div>
    
    <div class="stats-grid" id="statsGrid">
      <!-- 动态加载 -->
    </div>
    
    <div class="filter-bar">
      <input type="text" id="searchInput" placeholder="搜索用户昵称或openid..." onkeyup="if(event.key==='Enter')loadUsers()">
      <button class="btn btn-primary" onclick="loadUsers()">搜索</button>
    </div>
    
    <div class="user-table">
      <table>
        <thead>
          <tr>
            <th>头像</th>
            <th>昵称</th>
            <th>openid</th>
            <th>菜谱数</th>
            <th>收藏数</th>
            <th>注册时间</th>
            <th>最后登录</th>
            <th>操作</th>
          </tr>
        </thead>
        <tbody id="userList">
          <tr><td colspan="8" class="loading">加载中...</td></tr>
        </tbody>
      </table>
    </div>
  </div>

  <script>
    const API_BASE = window.location.origin + '/api';
    let token = localStorage.getItem('admin_token') || '';
    let allUsers = [];
    
    if (!token) {
      location.href = 'index.html';
    }
    
    loadStats();
    loadUsers();
    
    async function loadStats() {
      try {
        const res = await fetch(`${API_BASE}/admin/users/stats?token=${token}`);
        if (res.ok) {
          const data = await res.json();
          if (data.success) {
            renderStats(data.data);
          }
        }
      } catch (e) {}
    }
    
    function renderStats(stats) {
      document.getElementById('statsGrid').innerHTML = `
        <div class="stat-card">
          <h3>用户总数</h3>
          <div class="number">${stats.total || 0}</div>
        </div>
        <div class="stat-card">
          <h3>今日新增</h3>
          <div class="number">${stats.today || 0}</div>
        </div>
        <div class="stat-card">
          <h3>活跃用户（7天内）</h3>
          <div class="number">${stats.active7d || 0}</div>
        </div>
        <div class="stat-card">
          <h3>菜谱贡献者</h3>
          <div class="number">${stats.contributors || 0}</div>
        </div>
      `;
    }
    
    async function loadUsers() {
      const search = document.getElementById('searchInput').value.trim();
      const listEl = document.getElementById('userList');
      listEl.innerHTML = '<tr><td colspan="8" class="loading">加载中...</td></tr>';
      
      try {
        let url = `${API_BASE}/admin/users/list?token=${token}`;
        
        const res = await fetch(url);
        if (res.status === 401) {
          localStorage.removeItem('admin_token');
          location.href = 'index.html';
          return;
        }
        const data = await res.json();
        allUsers = data.data || [];
        
        // 前端搜索过滤
        let filtered = allUsers;
        if (search) {
          filtered = allUsers.filter(u => 
            (u.nickName && u.nickName.includes(search)) || 
            (u.openid && u.openid.includes(search))
          );
        }
        
        if (!filtered.length) {
          listEl.innerHTML = '<tr><td colspan="8" class="empty">暂无用户</td></tr>';
          return;
        }
        
        listEl.innerHTML = filtered.map(u => `
          <tr>
            <td><img class="user-avatar" src="${u.avatarUrl || 'https://via.placeholder.com/40'}" alt="" onerror="this.src='https://via.placeholder.com/40'"></td>
            <td>${escapeHtml(u.nickName || '未设置')}</td>
            <td style="font-size:12px;color:#666;">${u.openid ? u.openid.substring(0, 20) + '...' : '-'}</td>
            <td>${u.recipeCount || 0}</td>
            <td>${u.collectCount || 0}</td>
            <td>${formatDate(u.created_at)}</td>
            <td>${formatDate(u.last_login)}</td>
            <td>
              <button class="btn btn-sm btn-secondary" onclick="showUserDetail('${u.openid}')">详情</button>
            </td>
          </tr>
        `).join('');
      } catch (e) {
        console.error(e);
        listEl.innerHTML = '<tr><td colspan="8" class="empty">网络错误</td></tr>';
      }
    }
    
    function showUserDetail(openid) {
      const u = allUsers.find(x => x.openid === openid);
      if (!u) return;
      alert(`用户详情\n\n昵称：${u.nickName || '未设置'}\nopenid：${u.openid}\n菜谱数：${u.recipeCount || 0}\n收藏数：${u.collectCount || 0}\n点赞数：${u.likeCount || 0}\n笔记数：${u.noteCount || 0}`);
    }
    
    function formatDate(dateStr) {
      if (!dateStr) return '-';
      const d = new Date(dateStr);
      return `${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}-${String(d.getDate()).padStart(2,'0')}`;
    }
    
    function escapeHtml(str) {
      if (!str) return '';
      return String(str).replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;');
    }
    
    function logout() {
      localStorage.removeItem('admin_token');
      location.href = 'index.html';
    }
  </script>
</body>
</html>
