<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>用户反馈 - 美食菜谱大全后台</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      background: #f5f7fa;
      min-height: 100vh;
    }
    .sidebar {
      position: fixed;
      left: 0;
      top: 0;
      width: 220px;
      height: 100vh;
      background: #2c3e50;
      color: white;
      padding: 20px 0;
    }
    .sidebar h2 {
      padding: 0 20px 20px;
      font-size: 18px;
      border-bottom: 1px solid rgba(255,255,255,0.1);
    }
    .sidebar a {
      display: block;
      padding: 12px 20px;
      color: rgba(255,255,255,0.8);
      text-decoration: none;
    }
    .sidebar a:hover, .sidebar a.active {
      background: rgba(255,255,255,0.1);
      color: white;
    }
    .sidebar .logout {
      position: absolute;
      bottom: 20px;
      width: 100%;
      padding: 12px 20px;
      color: rgba(255,255,255,0.6);
      cursor: pointer;
    }
    .sidebar .logout:hover { color: white; }
    
    .main-content {
      margin-left: 220px;
      padding: 30px;
    }
    .page-header { margin-bottom: 20px; }
    .page-header h1 { font-size: 24px; margin-bottom: 8px; }
    
    .filter-bar {
      background: white;
      padding: 16px;
      border-radius: 8px;
      margin-bottom: 20px;
      display: flex;
      gap: 16px;
      align-items: center;
    }
    .filter-bar select {
      padding: 8px 12px;
      border: 1px solid #ddd;
      border-radius: 6px;
    }
    
    .feedback-list { display: flex; flex-direction: column; gap: 16px; }
    .feedback-card {
      background: white;
      padding: 20px;
      border-radius: 8px;
      box-shadow: 0 2px 8px rgba(0,0,0,0.05);
    }
    .feedback-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 12px;
    }
    .feedback-user {
      display: flex;
      align-items: center;
      gap: 10px;
    }
    .feedback-user img {
      width: 36px;
      height: 36px;
      border-radius: 50%;
    }
    .feedback-user .name { font-weight: 500; }
    .feedback-user .time { font-size: 12px; color: #999; }
    .status-badge {
      padding: 4px 10px;
      border-radius: 12px;
      font-size: 12px;
    }
    .status-pending { background: #fff3cd; color: #856404; }
    .status-resolved { background: #d4edda; color: #155724; }
    
    .feedback-content { margin-bottom: 12px; line-height: 1.6; white-space: pre-wrap; }
    .feedback-images { display: flex; gap: 8px; margin-bottom: 12px; }
    .feedback-images img {
      width: 80px;
      height: 80px;
      object-fit: cover;
      border-radius: 6px;
      cursor: pointer;
    }
    
    .admin-reply {
      background: #f8f9fa;
      padding: 12px;
      border-radius: 6px;
      margin-bottom: 12px;
      border-left: 3px solid #3498db;
    }
    .admin-reply-label { font-size: 12px; color: #666; margin-bottom: 4px; }
    
    .reply-form {
      display: none;
      margin-top: 12px;
    }
    .reply-form textarea {
      width: 100%;
      padding: 12px;
      border: 1px solid #ddd;
      border-radius: 6px;
      resize: vertical;
      min-height: 80px;
      margin-bottom: 10px;
    }
    .reply-form .actions { display: flex; gap: 10px; }
    
    .actions { display: flex; gap: 10px; }
    .btn {
      padding: 8px 16px;
      border: none;
      border-radius: 6px;
      cursor: pointer;
      font-size: 14px;
    }
    .btn-primary { background: #3498db; color: white; }
    .btn-success { background: #27ae60; color: white; }
    .btn-secondary { background: #95a5a6; color: white; }
    .btn:hover { opacity: 0.9; }
    
    .empty { text-align: center; padding: 40px; color: #999; }
    .loading { text-align: center; padding: 40px; }
  </style>
</head>
<body>
  <div class="sidebar">
    <h2>👔 美食菜谱大全后台</h2>
    <a href="index.html">📊 概览</a>
    <a href="comments.html">💬 评论管理</a>
    <a href="recipes.html">📖 菜谱管理</a>
    <a href="feedbacks.html" class="active">📝 用户反馈</a>
    <a href="users.html">👥 用户管理</a>
    <a href="non-dishes.html">🗑️ 非菜谱清理</a>
    <a href="reports.html">🚫 举报管理</a>
    <a href="published-articles.html">📋 选题记录</a>
    <div class="logout" onclick="logout()">退出登录</div>
  </div>
  
  <div class="main-content">
    <div class="page-header">
      <h1>📝 用户反馈</h1>
    </div>
    
    <div class="filter-bar">
      <label>状态：</label>
      <select id="statusFilter" onchange="loadFeedbacks()">
        <option value="pending">待处理</option>
        <option value="resolved">已处理</option>
        <option value="all">全部</option>
      </select>
      <label style="margin-left:12px">时间：</label>
      <input type="date" id="startDate" onchange="loadFeedbacks()">
      <span>~</span>
      <input type="date" id="endDate" onchange="loadFeedbacks()">
      <label style="margin-left:12px">排序：</label>
      <select id="sortBy" onchange="loadFeedbacks()">
        <option value="created_at">创建时间</option>
        <option value="updated_at">更新时间</option>
      </select>
      <select id="sortOrder" onchange="loadFeedbacks()">
        <option value="DESC">最新优先</option>
        <option value="ASC">最早优先</option>
      </select>
    </div>
    
    <div class="feedback-list" id="feedbackList">
      <div class="loading">加载中...</div>
    </div>
  </div>

  <script>
    const API_BASE = window.location.origin + '/api';
    let token = localStorage.getItem('admin_token') || '';
    
    if (!token) {
      location.href = 'index.html';
    }
    
    loadFeedbacks();
    
    async function loadFeedbacks() {
      const status = document.getElementById('statusFilter').value;
      const listEl = document.getElementById('feedbackList');
      listEl.innerHTML = '<div class="loading">加载中...</div>';
      
      try {
        const sortBy = document.getElementById('sortBy').value;
        const sortOrder = document.getElementById('sortOrder').value;
        const startDate = document.getElementById('startDate').value;
        const endDate = document.getElementById('endDate').value;
        const params = new URLSearchParams({ token, status, sortBy, sortOrder });
        if (startDate) params.set('startDate', startDate);
        if (endDate) params.set('endDate', endDate);
        const res = await fetch(`${API_BASE}/admin/feedbacks/list?${params.toString()}`);
        if (res.status === 401) {
          localStorage.removeItem('admin_token');
          location.href = 'index.html';
          return;
        }
        const data = await res.json();
        
        if (!data.data?.length) {
          listEl.innerHTML = '<div class="empty">暂无反馈</div>';
          return;
        }
        
        listEl.innerHTML = data.data.map(f => `
          <div class="feedback-card">
            <div class="feedback-header">
              <div class="feedback-user">
                <img src="${f.avatarUrl || 'https://mmbiz.qpic.cn/mmbiz/icTdbqWNOwNRna42FI242Lcia07jQodd2FJGIYQfG0LAJGFxM4FbnQP6yfMxBgJ0F3YRqJCJ1aPAK2dQagdusBZg/0'}" alt="">
                <div>
                  <div class="name">${f.nickName || '用户'}</div>
                  <div class="time">${formatDate(f.created_at)}</div>
                </div>
              </div>
              <span class="status-badge status-${f.status}">${f.status === 'pending' ? '待处理' : '已处理'}</span>
            </div>
            <div class="feedback-content">${escapeHtml(f.content)}</div>
            ${f.images?.length ? `
              <div class="feedback-images">
                ${f.images.map(img => `<img src="${img}" onclick="window.open('${img}')" alt="">`).join('')}
              </div>
            ` : ''}
            ${f.admin_reply ? `
              <div class="admin-reply">
                <div class="admin-reply-label">管理员回复：</div>
                <div>${escapeHtml(f.admin_reply)}</div>
              </div>
            ` : ''}
            <div class="actions">
              ${f.status === 'pending' ? `
                <button class="btn btn-primary" onclick="showReplyForm(${f.id})">回复</button>
                <button class="btn btn-success" onclick="resolveFeedback(${f.id})">标记已处理</button>
              ` : ''}
            </div>
            <div class="reply-form" id="reply-form-${f.id}">
              <textarea id="reply-text-${f.id}" placeholder="输入回复内容..."></textarea>
              <div class="actions">
                <button class="btn btn-primary" onclick="submitReply(${f.id})">发送回复</button>
                <button class="btn btn-secondary" onclick="hideReplyForm(${f.id})">取消</button>
              </div>
            </div>
          </div>
        `).join('');
      } catch (e) {
        listEl.innerHTML = '<div class="empty">网络错误</div>';
      }
    }
    
    function showReplyForm(id) {
      document.getElementById(`reply-form-${id}`).style.display = 'block';
    }
    
    function hideReplyForm(id) {
      document.getElementById(`reply-form-${id}`).style.display = 'none';
    }
    
    async function submitReply(id) {
      const text = document.getElementById(`reply-text-${id}`).value.trim();
      if (!text) {
        alert('请输入回复内容');
        return;
      }
      
      try {
        const res = await fetch(`${API_BASE}/admin/feedbacks/reply`, {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ token, feedbackId: id, reply: text })
        });
        if (res.status === 401) {
          localStorage.removeItem('admin_token');
          location.href = 'index.html';
          return;
        }
        const data = await res.json();
        if (data.success) {
          loadFeedbacks();
        } else {
          alert(data.error || '回复失败');
        }
      } catch (e) {
        alert('网络错误');
      }
    }
    
    async function resolveFeedback(id) {
      if (!confirm('确定标记为已处理？')) return;
      
      try {
        const res = await fetch(`${API_BASE}/admin/feedbacks/resolve`, {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ token, feedbackId: id })
        });
        if (res.status === 401) {
          localStorage.removeItem('admin_token');
          location.href = 'index.html';
          return;
        }
        const data = await res.json();
        if (data.success) {
          loadFeedbacks();
        } else {
          alert(data.error || '操作失败');
        }
      } catch (e) {
        alert('网络错误');
      }
    }
    
    function formatDate(dateStr) {
      if (!dateStr) return '-';
      const d = new Date(dateStr);
      return `${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}-${String(d.getDate()).padStart(2,'0')} ${String(d.getHours()).padStart(2,'0')}:${String(d.getMinutes()).padStart(2,'0')}:${String(d.getSeconds()).padStart(2,'0')}`;
    }

    function escapeHtml(str) {
      return String(str).replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;');
    }
    
    function logout() {
      localStorage.removeItem('admin_token');
      location.href = 'index.html';
    }
  </script>
</body>
</html>
