<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>菜谱管理 - 味口后台</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      background: #f5f7fa;
      min-height: 100vh;
    }
    .sidebar {
      position: fixed;
      left: 0;
      top: 0;
      width: 220px;
      height: 100vh;
      background: #2c3e50;
      color: white;
      padding: 20px 0;
    }
    .sidebar h2 {
      padding: 0 20px 20px;
      font-size: 18px;
      border-bottom: 1px solid rgba(255,255,255,0.1);
    }
    .sidebar a {
      display: block;
      padding: 12px 20px;
      color: rgba(255,255,255,0.8);
      text-decoration: none;
    }
    .sidebar a:hover, .sidebar a.active {
      background: rgba(255,255,255,0.1);
      color: white;
    }
    .sidebar .logout {
      position: absolute;
      bottom: 20px;
      width: 100%;
      padding: 12px 20px;
      color: rgba(255,255,255,0.6);
      cursor: pointer;
    }
    .sidebar .logout:hover { color: white; }
    
    .main-content {
      margin-left: 220px;
      padding: 30px;
    }
    .page-header { margin-bottom: 20px; }
    .page-header h1 { font-size: 24px; margin-bottom: 8px; }
    
    .stats-row {
      background: white;
      padding: 16px;
      border-radius: 8px;
      margin-bottom: 20px;
      display: flex;
      gap: 24px;
      align-items: center;
    }
    .stats-row span { color: #666; }
    .stats-row strong { color: #2c3e50; font-size: 18px; }
    
    .filter-bar {
      background: white;
      padding: 16px;
      border-radius: 8px;
      margin-bottom: 20px;
      display: flex;
      gap: 16px;
      align-items: center;
      flex-wrap: wrap;
    }
    .filter-bar select, .filter-bar input {
      padding: 8px 12px;
      border: 1px solid #ddd;
      border-radius: 6px;
    }
    .search-box {
      flex: 1;
      min-width: 200px;
    }
    
    .recipe-table {
      background: white;
      border-radius: 8px;
      overflow: hidden;
      box-shadow: 0 2px 8px rgba(0,0,0,0.05);
    }
    .table-wrapper { overflow-x: auto; }
    table { width: 100%; border-collapse: collapse; min-width: 900px; }
    th, td { padding: 12px 16px; text-align: left; border-bottom: 1px solid #eee; }
    th { background: #f8f9fa; font-weight: 500; white-space: nowrap; }
    .recipe-title { max-width: 200px; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
    .recipe-cover { 
      width: 60px; 
      height: 60px; 
      object-fit: cover; 
      border-radius: 6px; 
      background: #f0f0f0;
    }
    .status-badge {
      padding: 4px 10px;
      border-radius: 12px;
      font-size: 12px;
      display: inline-block;
      margin-right: 4px;
    }
    .status-approved { background: #d4edda; color: #155724; }
    .status-pending { background: #fff3cd; color: #856404; }
    .status-rejected { background: #f8d7da; color: #721c24; }
    .featured { background: #cce5ff; color: #004085; }
    
    .actions { display: flex; gap: 6px; flex-wrap: wrap; }
    .btn {
      padding: 6px 12px;
      border: none;
      border-radius: 4px;
      cursor: pointer;
      font-size: 13px;
    }
    .btn-sm { padding: 4px 8px; font-size: 12px; }
    .btn-primary { background: #27ae60; color: white; }
    .btn-danger { background: #e74c3c; color: white; }
    .btn-secondary { background: #95a5a6; color: white; }
    .btn-warning { background: #f39c12; color: white; }
    .btn-info { background: #3498db; color: white; }
    .btn:hover { opacity: 0.9; }
    
    .empty { text-align: center; padding: 40px; color: #999; }
    .loading { text-align: center; padding: 40px; }
    
    /* 分页 */
    .pagination {
      display: flex;
      justify-content: center;
      align-items: center;
      gap: 8px;
      padding: 20px;
      background: white;
      border-top: 1px solid #eee;
    }
    .pagination button, .pagination span {
      padding: 8px 12px;
      border: 1px solid #ddd;
      background: white;
      border-radius: 4px;
      cursor: pointer;
    }
    .pagination button:hover { background: #f5f5f5; }
    .pagination button:disabled { opacity: 0.5; cursor: not-allowed; }
    .pagination .current {
      background: #3498db;
      color: white;
      border-color: #3498db;
    }
    
    /* 编辑弹窗 */
    .modal {
      display: none;
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background: rgba(0,0,0,0.5);
      z-index: 1000;
      align-items: center;
      justify-content: center;
    }
    .modal.show { display: flex; }
    .modal-content {
      background: white;
      padding: 24px;
      border-radius: 12px;
      width: 600px;
      max-height: 80vh;
      overflow-y: auto;
    }
    .modal-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 20px;
    }
    .modal-header h3 { font-size: 18px; }
    .modal-close {
      font-size: 24px;
      cursor: pointer;
      color: #999;
    }
    .form-group { margin-bottom: 16px; }
    .form-group label { display: block; margin-bottom: 6px; font-weight: 500; }
    .form-group input, .form-group textarea, .form-group select {
      width: 100%;
      padding: 10px;
      border: 1px solid #ddd;
      border-radius: 6px;
    }
    .form-group textarea { min-height: 100px; resize: vertical; }
    .modal-footer {
      margin-top: 20px;
      display: flex;
      gap: 10px;
      justify-content: flex-end;
    }
    
    /* 详情弹窗 */
    .detail-section { margin-bottom: 16px; }
    .detail-section h4 { margin-bottom: 8px; color: #333; }
    .detail-section p { color: #666; line-height: 1.6; }
    .ingredient-list, .step-list { padding-left: 20px; }
    .ingredient-list li, .step-list li { margin-bottom: 6px; color: #666; }
  </style>
</head>
<body>
  <div class="sidebar">
    <h2>👔 味口后台</h2>
    <a href="index.html">📊 概览</a>
    <a href="comments.html">💬 评论管理</a>
    <a href="recipes.html" class="active">📖 菜谱管理</a>
    <a href="feedbacks.html">📝 用户反馈</a>
    <a href="users.html">👥 用户管理</a>
    <a href="non-dishes.html">🗑️ 非菜谱清理</a>
    <a href="reports.html">🚫 举报管理</a>
    <a href="published-articles.html">📋 选题记录</a>
    <div class="logout" onclick="logout()">退出登录</div>
  </div>
  
  <div class="main-content">
    <div class="page-header">
      <h1>📖 菜谱管理</h1>
    </div>
    
    <div class="stats-row" id="statsRow">
      加载中...
    </div>
    
    <div class="filter-bar">
      <label>状态：</label>
      <select id="statusFilter" onchange="changeFilter()">
        <option value="approved">已发布</option>
        <option value="pending">待审核</option>
        <option value="rejected">已拒绝</option>
        <option value="all">全部</option>
      </select>
      <label>来源：</label>
      <select id="sourceFilter" onchange="changeFilter()">
        <option value="all">全部</option>
        <option value="system">系统导入</option>
        <option value="user">用户发布</option>
      </select>
      <label>精选：</label>
      <select id="featuredFilter" onchange="changeFilter()">
        <option value="all">全部</option>
        <option value="1">已精选</option>
        <option value="0">未精选</option>
      </select>
      <input type="text" id="searchInput" class="search-box" placeholder="搜索菜谱标题..." onkeyup="if(event.key==='Enter'){currentPage=1;loadRecipes()}">
      <button class="btn btn-primary" onclick="currentPage=1;loadRecipes()">搜索</button>
      <button class="btn btn-danger" onclick="clearSystemRecipes()">🗑️ 清空系统菜谱</button>
    </div>
    
    <div class="recipe-table">
      <div class="table-wrapper">
        <table>
          <thead>
            <tr>
              <th style="width:40px;"><input type="checkbox" id="checkAll" onchange="toggleCheckAll()"></th>
              <th>封面</th>
              <th>标题</th>
              <th>作者</th>
              <th>状态</th>
              <th>收藏/点赞</th>
              <th>发布时间</th>
              <th>操作</th>
            </tr>
          </thead>
          <tbody id="recipeList">
            <tr><td colspan="8" class="loading">加载中...</td></tr>
          </tbody>
        </table>
      </div>
      <div class="pagination" id="pagination"></div>
    </div>
  </div>

  <!-- 编辑弹窗 -->
  <div class="modal" id="editModal">
    <div class="modal-content">
      <div class="modal-header">
        <h3>编辑菜谱</h3>
        <span class="modal-close" onclick="closeEditModal()">&times;</span>
      </div>
      <div class="form-group">
        <label>标题</label>
        <input type="text" id="editTitle">
      </div>
      <div class="form-group">
        <label>封面图</label>
        <input type="text" id="editCover" placeholder="https://...">
        <div style="margin-top:8px;display:flex;align-items:center;gap:10px;">
          <label style="display:inline-block;padding:6px 14px;background:#07c160;color:#fff;border-radius:6px;cursor:pointer;font-size:13px;">
            📷 上传图片
            <input type="file" accept="image/*" id="editCoverFile" style="display:none" onchange="handleCoverUpload(this)">
          </label>
          <span id="uploadProgress" style="font-size:12px;color:#999;"></span>
        </div>
        <div style="margin-top:8px;">
          <img id="editCoverPreview" src="" style="max-width:200px;max-height:150px;border-radius:6px;display:none;">
        </div>
      </div>
      <div class="form-group">
        <label>难度</label>
        <select id="editDifficulty">
          <option value="1">简单</option>
          <option value="2">中等</option>
          <option value="3">困难</option>
        </select>
      </div>
      <div class="form-group">
        <label>烹饪时长</label>
        <input type="text" id="editDuration" placeholder="如：30分钟">
      </div>
      <div class="form-group">
        <label>标签（逗号分隔）</label>
        <input type="text" id="editTags" placeholder="下饭菜,家常菜">
      </div>
      <div class="form-group">
        <label>小贴士</label>
        <textarea id="editTips" rows="3"></textarea>
      </div>
      <input type="hidden" id="editRecipeId">
      <div class="modal-footer">
        <button class="btn btn-secondary" onclick="closeEditModal()">取消</button>
        <button class="btn btn-primary" onclick="saveRecipe()">保存</button>
      </div>
    </div>
  </div>

  <!-- 详情弹窗 -->
  <div class="modal" id="detailModal">
    <div class="modal-content">
      <div class="modal-header">
        <h3>菜谱详情</h3>
        <span class="modal-close" onclick="closeDetailModal()">&times;</span>
      </div>
      <div id="detailContent"></div>
    </div>
  </div>

  <script>
    const API_BASE = window.location.origin + '/api';
    let token = localStorage.getItem('admin_token') || '';
    let allRecipes = [];
    let currentPage = 1;
    let pageSize = 15;
    let totalCount = 0;
    let checkedIds = new Set();

    function toggleCheckAll() {
      const el = document.getElementById('checkAll');
      if (el.checked) {
        checkedIds = new Set(allRecipes.map(r => r.id));
      } else {
        checkedIds = new Set();
      }
      document.querySelectorAll('.row-check').forEach(cb => cb.checked = el.checked);
    }

    function onCheckChange(id) {
      if (checkedIds.has(id)) {
        checkedIds.delete(id);
      } else {
        checkedIds.add(id);
      }
      const allChecked = allRecipes.length > 0 && checkedIds.size === allRecipes.length;
      document.getElementById('checkAll').checked = allChecked;
    }

    async function clearSystemRecipes() {
      if (!confirm('确定清空所有系统导入的菜谱？（用户菜谱不受影响）')) return;
      const btn = document.querySelector('[onclick="clearSystemRecipes()"]');
      btn.disabled = true;
      btn.textContent = '清空中...';
      try {
        const res = await fetch(`${API_BASE}/admin/recipes/clear-system`, {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ token })
        });
        const data = await res.json();
        if (data.success) {
          alert(`已清空 ${data.deleted} 条系统菜谱`);
          currentPage = 1;
          loadRecipes();
        } else {
          alert('清空失败: ' + (data.error || '未知错误'));
        }
      } catch (e) {
        alert('清空失败: ' + e.message);
      } finally {
        btn.disabled = false;
        btn.textContent = '🗑️ 清空系统菜谱';
      }
    }
    
    if (!token) {
      location.href = 'index.html';
    }
    
    // 封面预览
    document.getElementById('editCover').addEventListener('input', function() {
      const preview = document.getElementById('editCoverPreview');
      if (this.value) {
        preview.src = this.value;
        preview.style.display = 'block';
        preview.onerror = () => preview.style.display = 'none';
      } else {
        preview.style.display = 'none';
      }
    });
    
    loadRecipes();
    
    function changeFilter() {
      currentPage = 1;
      loadRecipes();
    }
    
    async function loadRecipes() {
      const status = document.getElementById('statusFilter').value;
      const source = document.getElementById('sourceFilter').value;
      const featured = document.getElementById('featuredFilter').value;
      const search = document.getElementById('searchInput').value.trim();
      const listEl = document.getElementById('recipeList');
      listEl.innerHTML = '<tr><td colspan="8" class="loading">加载中...</td></tr>';
      
      try {
        let url = `${API_BASE}/admin/recipes/list?token=${token}&status=${status}&page=${currentPage}&pageSize=${pageSize}`;
        if (source !== 'all') url += `&source=${source}`;
        if (featured !== 'all') url += `&isFeatured=${featured}`;
        if (search) url += `&search=${encodeURIComponent(search)}`;
        
        const res = await fetch(url);
        if (res.status === 401) {
          localStorage.removeItem('admin_token');
          location.href = 'index.html';
          return;
        }
        const data = await res.json();
        allRecipes = data.data || [];
        totalCount = data.total || 0;
        
        // 更新统计
        const totalPages = Math.ceil(totalCount / pageSize);
        document.getElementById('statsRow').innerHTML = `
          <span>共 <strong>${totalCount}</strong> 条菜谱</span>
          <span>第 <strong>${currentPage}</strong> / <strong>${totalPages || 1}</strong> 页</span>
        `;
        
        if (!allRecipes.length) {
          listEl.innerHTML = '<tr><td colspan="8" class="empty">暂无菜谱</td></tr>';
          renderPagination();
          return;
        }
        
        listEl.innerHTML = allRecipes.map(r => `
          <tr>
            <td><input type="checkbox" class="row-check" value="${r.id}" ${checkedIds.has(r.id) ? 'checked' : ''} onchange="onCheckChange(${r.id})"></td>
            <td><img class="recipe-cover" src="${getCoverUrl(r.cover)}" alt="" onerror="this.src='https://via.placeholder.com/60?text=No'"></td>
            <td class="recipe-title" title="${escapeHtml(r.title)}">${escapeHtml(r.title)}</td>
            <td>${r.authorOpenid === 'system' 
              ? '<span style="background:#e9ecef;color:#6c757d;padding:2px 8px;border-radius:10px;font-size:11px">系统导入</span>' 
              : '<span style="color:#333">' + (r.nickName || '-') + '</span>'}</td>
            <td>
              <span class="status-badge status-${r.status}">${getStatusText(r.status)}</span>
              ${r.is_featured ? '<span class="status-badge featured">精选</span>' : ''}
            </td>
            <td>${r.collectCount || 0} / ${r.likeCount || 0}</td>
            <td>${formatDate(r.created_at)}</td>
            <td class="actions">
              <button class="btn btn-sm btn-info" onclick="showDetail(${r.id})">详情</button>
              <button class="btn btn-sm btn-warning" onclick="editRecipe(${r.id})">编辑</button>
              ${r.status === 'pending' ? `
                <button class="btn btn-sm btn-primary" onclick="approveRecipe(${r.id})">通过</button>
                <button class="btn btn-sm btn-danger" onclick="rejectRecipe(${r.id})">拒绝</button>
              ` : ''}
              ${!r.is_featured ? 
                `<button class="btn btn-sm btn-secondary" onclick="featureRecipe(${r.id})">设精选</button>` :
                `<button class="btn btn-sm btn-secondary" onclick="unfeatureRecipe(${r.id})">取消精选</button>`
              }
              <button class="btn btn-sm btn-danger" onclick="deleteRecipe(${r.id})">删除</button>
            </td>
          </tr>
        `).join('');
        
        renderPagination();
      } catch (e) {
        console.error(e);
        listEl.innerHTML = '<tr><td colspan="8" class="empty">网络错误</td></tr>';
      }
    }
    
    function renderPagination() {
      const totalPages = Math.ceil(totalCount / pageSize);
      const el = document.getElementById('pagination');
      
      if (totalPages <= 1) {
        el.innerHTML = '';
        return;
      }
      
      let html = '';
      html += `<button onclick="goToPage(${currentPage - 1})" ${currentPage === 1 ? 'disabled' : ''}>上一页</button>`;
      
      // 显示页码
      const start = Math.max(1, currentPage - 2);
      const end = Math.min(totalPages, currentPage + 2);
      
      if (start > 1) {
        html += `<button onclick="goToPage(1)">1</button>`;
        if (start > 2) html += `<span>...</span>`;
      }
      
      for (let i = start; i <= end; i++) {
        html += `<button onclick="goToPage(${i})" class="${i === currentPage ? 'current' : ''}">${i}</button>`;
      }
      
      if (end < totalPages) {
        if (end < totalPages - 1) html += `<span>...</span>`;
        html += `<button onclick="goToPage(${totalPages})">${totalPages}</button>`;
      }
      
      html += `<button onclick="goToPage(${currentPage + 1})" ${currentPage === totalPages ? 'disabled' : ''}>下一页</button>`;
      
      el.innerHTML = html;
    }
    
    function goToPage(page) {
      const totalPages = Math.ceil(totalCount / pageSize);
      if (page < 1 || page > totalPages) return;
      currentPage = page;
      loadRecipes();
    }
    
    function getCoverUrl(cover) {
      if (!cover) return 'https://via.placeholder.com/60?text=No';
      if (cover.startsWith('http')) return cover;
      return cover;
    }
    
    function showDetail(id) {
      const r = allRecipes.find(x => x.id === id);
      if (!r) return;
      
      let ingredients = [];
      let steps = [];
      try {
        ingredients = JSON.parse(r.ingredients || '[]');
        steps = JSON.parse(r.steps || '[]');
      } catch (e) {}
      
      const content = `
        <div class="detail-section">
          <img src="${getCoverUrl(r.cover)}" style="max-width:100%;max-height:300px;border-radius:8px;" onerror="this.style.display='none'">
        </div>
        <div class="detail-section">
          <h4>标题</h4>
          <p>${escapeHtml(r.title)}</p>
        </div>
        <div class="detail-section">
          <h4>难度/时长</h4>
          <p>${['','简单','中等','困难'][r.difficulty || 2]} · ${r.duration || '未知'}</p>
        </div>
        <div class="detail-section">
          <h4>食材</h4>
          <ul class="ingredient-list">
            ${ingredients.map(i => `<li>${escapeHtml(i)}</li>`).join('') || '<li>无</li>'}
          </ul>
        </div>
        <div class="detail-section">
          <h4>步骤</h4>
          <ol class="step-list">
            ${steps.map(s => `<li>${escapeHtml(s)}</li>`).join('') || '<li>无</li>'}
          </ol>
        </div>
        ${r.tips ? `
        <div class="detail-section">
          <h4>小贴士</h4>
          <p>${escapeHtml(r.tips)}</p>
        </div>
        ` : ''}
      `;
      
      document.getElementById('detailContent').innerHTML = content;
      document.getElementById('detailModal').classList.add('show');
    }
    
    function closeDetailModal() {
      document.getElementById('detailModal').classList.remove('show');
    }
    
    function editRecipe(id) {
      const r = allRecipes.find(x => x.id === id);
      if (!r) return;
      
      document.getElementById('editRecipeId').value = id;
      document.getElementById('editTitle').value = r.title || '';
      document.getElementById('editCover').value = r.cover || '';
      document.getElementById('editDifficulty').value = r.difficulty || 2;
      document.getElementById('editDuration').value = r.duration || '';
      document.getElementById('editTags').value = r.tags || '';
      document.getElementById('editTips').value = r.tips || '';
      
      const preview = document.getElementById('editCoverPreview');
      if (r.cover) {
        preview.src = r.cover;
        preview.style.display = 'block';
      } else {
        preview.style.display = 'none';
      }
      
      document.getElementById('editModal').classList.add('show');
    }
    
    function closeEditModal() {
      document.getElementById('editModal').classList.remove('show');
    }
    
    async function handleCoverUpload(input) {
      const file = input.files[0];
      if (!file) return;
      if (file.size > 5 * 1024 * 1024) { alert('图片不能超过5MB'); return; }
      const progress = document.getElementById('uploadProgress');
      progress.textContent = '上传中...';
      try {
        const reader = new FileReader();
        reader.onload = async (e) => {
          const base64 = e.target.result.split(',')[1];
          const res = await fetch(`${API_BASE}/upload-image`, {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ imageBase64: base64 })
          });
          const data = await res.json();
          if (data.success && data.url) {
            document.getElementById('editCover').value = data.url;
            const preview = document.getElementById('editCoverPreview');
            preview.src = data.url;
            preview.style.display = 'block';
            progress.textContent = '✅ 上传成功';
            setTimeout(() => progress.textContent = '', 2000);
          } else {
            progress.textContent = '❌ ' + (data.error || '上传失败');
          }
        };
        reader.readAsDataURL(file);
      } catch (e) {
        progress.textContent = '❌ 上传失败';
      }
    }

    async function saveRecipe() {
      const id = document.getElementById('editRecipeId').value;
      const body = {
        token,
        recipeId: parseInt(id),
        title: document.getElementById('editTitle').value,
        cover: document.getElementById('editCover').value,
        difficulty: parseInt(document.getElementById('editDifficulty').value),
        duration: document.getElementById('editDuration').value,
        tags: document.getElementById('editTags').value,
        tips: document.getElementById('editTips').value,
      };
      
      try {
        const res = await fetch(`${API_BASE}/admin/recipes/update`, {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify(body)
        });
        const data = await res.json();
        if (data.success) {
          closeEditModal();
          loadRecipes();
        } else {
          alert(data.error || '保存失败');
        }
      } catch (e) {
        alert('网络错误');
      }
    }
    
    async function approveRecipe(id) {
      if (!confirm('确定通过该菜谱？')) return;
      await updateStatus(id, 'approve');
    }
    
    async function rejectRecipe(id) {
      if (!confirm('确定拒绝该菜谱？')) return;
      await updateStatus(id, 'reject');
    }
    
    async function featureRecipe(id) {
      if (!confirm('确定设为精选？')) return;
      await fetch(`${API_BASE}/admin/recipes/feature`, {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ token, recipeId: id, isFeatured: true })
      });
      loadRecipes();
    }
    
    async function unfeatureRecipe(id) {
      if (!confirm('确定取消精选？')) return;
      await fetch(`${API_BASE}/admin/recipes/feature`, {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ token, recipeId: id, isFeatured: false })
      });
      loadRecipes();
    }
    
    async function deleteRecipe(id) {
      if (!confirm('确定删除该菜谱？此操作不可恢复！')) return;
      
      try {
        const res = await fetch(`${API_BASE}/admin/recipes/delete`, {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ token, recipeId: id })
        });
        const data = await res.json();
        if (data.success) {
          loadRecipes();
        } else {
          alert(data.error || '删除失败');
        }
      } catch (e) {
        alert('网络错误');
      }
    }
    
    async function updateStatus(id, action) {
      try {
        const res = await fetch(`${API_BASE}/admin/recipes/${action}`, {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ token, recipeId: id })
        });
        if (res.status === 401) {
          localStorage.removeItem('admin_token');
          location.href = 'index.html';
          return;
        }
        const data = await res.json();
        if (data.success) {
          loadRecipes();
        } else {
          alert(data.error || '操作失败');
        }
      } catch (e) {
        alert('网络错误');
      }
    }
    
    function getStatusText(status) {
      return { pending: '待审核', approved: '已发布', rejected: '已拒绝' }[status] || status;
    }
    
    function formatDate(dateStr) {
      if (!dateStr) return '-';
      const d = new Date(dateStr);
      return `${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}-${String(d.getDate()).padStart(2,'0')}`;
    }
    
    function escapeHtml(str) {
      if (!str) return '';
      return String(str).replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;').replace(/"/g, '&quot;');
    }
    
    function logout() {
      localStorage.removeItem('admin_token');
      location.href = 'index.html';
    }
  </script>
</body>
</html>
