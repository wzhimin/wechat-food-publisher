<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>菜谱管理 - 味可觅后台</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      background: #f5f7fa;
      min-height: 100vh;
    }
    .sidebar {
      position: fixed;
      left: 0;
      top: 0;
      width: 220px;
      height: 100vh;
      background: #2c3e50;
      color: white;
      padding: 20px 0;
    }
    .sidebar h2 {
      padding: 0 20px 20px;
      font-size: 18px;
      border-bottom: 1px solid rgba(255,255,255,0.1);
    }
    .sidebar a {
      display: block;
      padding: 12px 20px;
      color: rgba(255,255,255,0.8);
      text-decoration: none;
    }
    .sidebar a:hover, .sidebar a.active {
      background: rgba(255,255,255,0.1);
      color: white;
    }
    .sidebar .logout {
      position: absolute;
      bottom: 20px;
      width: 100%;
      padding: 12px 20px;
      color: rgba(255,255,255,0.6);
      cursor: pointer;
    }
    .sidebar .logout:hover { color: white; }
    
    .main-content {
      margin-left: 220px;
      padding: 30px;
    }
    .page-header { margin-bottom: 20px; }
    .page-header h1 { font-size: 24px; margin-bottom: 8px; }
    
    .filter-bar {
      background: white;
      padding: 16px;
      border-radius: 8px;
      margin-bottom: 20px;
      display: flex;
      gap: 16px;
      align-items: center;
    }
    .filter-bar select, .filter-bar input {
      padding: 8px 12px;
      border: 1px solid #ddd;
      border-radius: 6px;
    }
    
    .recipe-table {
      background: white;
      border-radius: 8px;
      overflow: hidden;
      box-shadow: 0 2px 8px rgba(0,0,0,0.05);
    }
    table { width: 100%; border-collapse: collapse; }
    th, td { padding: 12px 16px; text-align: left; border-bottom: 1px solid #eee; }
    th { background: #f8f9fa; font-weight: 500; }
    .recipe-title { max-width: 200px; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
    .recipe-cover { width: 60px; height: 60px; object-fit: cover; border-radius: 6px; }
    .status-badge {
      padding: 4px 10px;
      border-radius: 12px;
      font-size: 12px;
    }
    .status-approved { background: #d4edda; color: #155724; }
    .status-pending { background: #fff3cd; color: #856404; }
    .status-rejected { background: #f8d7da; color: #721c24; }
    .featured { background: #cce5ff; color: #004085; }
    
    .actions { display: flex; gap: 8px; }
    .btn {
      padding: 6px 12px;
      border: none;
      border-radius: 4px;
      cursor: pointer;
      font-size: 13px;
    }
    .btn-sm { padding: 4px 8px; font-size: 12px; }
    .btn-primary { background: #27ae60; color: white; }
    .btn-danger { background: #e74c3c; color: white; }
    .btn-secondary { background: #95a5a6; color: white; }
    .btn-warning { background: #f39c12; color: white; }
    .btn:hover { opacity: 0.9; }
    
    .empty { text-align: center; padding: 40px; color: #999; }
    .loading { text-align: center; padding: 40px; }
  </style>
</head>
<body>
  <div class="sidebar">
    <h2>👔 味可觅后台</h2>
    <a href="index.html">📊 概览</a>
    <a href="comments.html">💬 评论审核</a>
    <a href="recipes.html" class="active">📖 菜谱管理</a>
    <a href="feedbacks.html">📝 用户反馈</a>
    <div class="logout" onclick="logout()">退出登录</div>
  </div>
  
  <div class="main-content">
    <div class="page-header">
      <h1>📖 菜谱管理</h1>
    </div>
    
    <div class="filter-bar">
      <label>状态：</label>
      <select id="statusFilter" onchange="loadRecipes()">
        <option value="approved">已发布</option>
        <option value="pending">待审核</option>
        <option value="rejected">已拒绝</option>
        <option value="all">全部</option>
      </select>
      <label>精选：</label>
      <select id="featuredFilter" onchange="loadRecipes()">
        <option value="all">全部</option>
        <option value="1">已精选</option>
        <option value="0">未精选</option>
      </select>
    </div>
    
    <div class="recipe-table">
      <table>
        <thead>
          <tr>
            <th>封面</th>
            <th>标题</th>
            <th>作者</th>
            <th>状态</th>
            <th>收藏/点赞</th>
            <th>发布时间</th>
            <th>操作</th>
          </tr>
        </thead>
        <tbody id="recipeList">
          <tr><td colspan="7" class="loading">加载中...</td></tr>
        </tbody>
      </table>
    </div>
  </div>

  <script>
    const API_BASE = window.location.origin + '/api';
    let token = localStorage.getItem('admin_token') || '';
    
    if (!token) {
      location.href = 'index.html';
    }
    
    loadRecipes();
    
    async function loadRecipes() {
      const status = document.getElementById('statusFilter').value;
      const featured = document.getElementById('featuredFilter').value;
      const listEl = document.getElementById('recipeList');
      listEl.innerHTML = '<tr><td colspan="7" class="loading">加载中...</td></tr>';
      
      try {
        let url = `${API_BASE}/admin/recipes/list?token=${token}&status=${status}`;
        if (featured !== 'all') url += `&isFeatured=${featured}`;
        
        const res = await fetch(url);
        if (res.status === 401) {
          localStorage.removeItem('admin_token');
          location.href = 'index.html';
          return;
        }
        const data = await res.json();
        
        if (!data.data?.length) {
          listEl.innerHTML = '<tr><td colspan="7" class="empty">暂无菜谱</td></tr>';
          return;
        }
        
        listEl.innerHTML = data.data.map(r => `
          <tr>
            <td><img class="recipe-cover" src="${r.coverUrl || 'https://via.placeholder.com/60'}" alt=""></td>
            <td class="recipe-title" title="${escapeHtml(r.title)}">${escapeHtml(r.title)}</td>
            <td>${r.nickName || '用户'}</td>
            <td>
              <span class="status-badge status-${r.status}">${getStatusText(r.status)}</span>
              ${r.is_featured ? '<span class="status-badge featured">精选</span>' : ''}
            </td>
            <td>${r.collectCount || 0} / ${r.likeCount || 0}</td>
            <td>${new Date(r.created_at).toLocaleDateString()}</td>
            <td class="actions">
              ${r.status === 'pending' ? `
                <button class="btn btn-sm btn-primary" onclick="approveRecipe(${r.id})">通过</button>
                <button class="btn btn-sm btn-danger" onclick="rejectRecipe(${r.id})">拒绝</button>
              ` : ''}
              ${!r.is_featured ? 
                `<button class="btn btn-sm btn-warning" onclick="featureRecipe(${r.id})">设精选</button>` :
                `<button class="btn btn-sm btn-secondary" onclick="unfeatureRecipe(${r.id})">取消精选</button>`
              }
            </td>
          </tr>
        `).join('');
      } catch (e) {
        listEl.innerHTML = '<tr><td colspan="7" class="empty">网络错误</td></tr>';
      }
    }
    
    async function approveRecipe(id) {
      if (!confirm('确定通过该菜谱？')) return;
      await updateStatus(id, 'approve');
    }
    
    async function rejectRecipe(id) {
      if (!confirm('确定拒绝该菜谱？')) return;
      await updateStatus(id, 'reject');
    }
    
    async function featureRecipe(id) {
      await fetch(`${API_BASE}/admin/recipes/feature`, {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ token, recipeId: id, isFeatured: true })
      });
      loadRecipes();
    }
    
    async function unfeatureRecipe(id) {
      await fetch(`${API_BASE}/admin/recipes/feature`, {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ token, recipeId: id, isFeatured: false })
      });
      loadRecipes();
    }
    
    async function updateStatus(id, action) {
      try {
        const res = await fetch(`${API_BASE}/admin/recipes/${action}`, {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ token, recipeId: id })
        });
        if (res.status === 401) {
          localStorage.removeItem('admin_token');
          location.href = 'index.html';
          return;
        }
        const data = await res.json();
        if (data.success) {
          loadRecipes();
        } else {
          alert(data.error || '操作失败');
        }
      } catch (e) {
        alert('网络错误');
      }
    }
    
    function getStatusText(status) {
      return { pending: '待审核', approved: '已发布', rejected: '已拒绝' }[status] || status;
    }
    
    function escapeHtml(str) {
      return String(str).replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;');
    }
    
    function logout() {
      localStorage.removeItem('admin_token');
      location.href = 'index.html';
    }
  </script>
</body>
</html>
